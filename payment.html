<script>
const ACCESS_HASH='9af15b336e6a9619928537df30b2e6a2376569fcf9d7e773eccede65606529a0';
const ACCESS_KEY='atm_payment_access_ok';
const GOOGLE_CLIENT_KEY='atm_google_client_id_v2';
const GOOGLE_DEFAULT_CLIENT_ID='';
const GOOGLE_SCOPE='https://www.googleapis.com/auth/calendar.readonly';
const GOOGLE_DISCOVERY='https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
const CALS=[
  {id:'atmind0361@gmail.com',name:'문래점'},
  {id:'1824a066dc6b3d4d7f89ae11beaf22d7f24c78856a04552a3a03ce3200b7fbd2@group.calendar.google.com',name:'신논현점'}
];
const TOOL='mcp__7562d3df-f0a0-4481-87e0-f6c4660717b3__list_events';
let allData=[], ov={};
let refreshTimer=null;
let googleReady=null, tokenClient=null;

async function sha256(text){
  const data=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest('SHA-256',data);
  return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showApp(){
  document.body.classList.remove('locked');
  document.getElementById('authScreen').style.display='none';
  loadAll();
  if(!refreshTimer)refreshTimer=setInterval(loadAll,60000);
}

async function unlockApp(e){
  e.preventDefault();
  const input=document.getElementById('accessPass');
  const err=document.getElementById('authErr');
  err.textContent='';
  if(await sha256(input.value)===ACCESS_HASH){
    sessionStorage.setItem(ACCESS_KEY,'1');
    showApp();
  }else{
    err.textContent='비밀번호가 맞지 않습니다.';
    input.value='';
    input.focus();
  }
}

function sh(s){
  return(s||'')
    .replace(/<br\s*\/?>/gi,'\n').replace(/<p[^>]*>/gi,'\n').replace(/<\/p>/gi,'')
    .replace(/<[biu][^>]*>(.*?)<\/[biu]>/gi,'$1').replace(/<[^>]+>/g,' ')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}
function pa(s){return parseInt((s||'').replace(/,/g,''))||0}
function fa(n){return n?n.toLocaleString('ko-KR')+'원':'-'}
function gm(l){
  if(/신신페이|카드결제|카드\s*결제|국민카드|삼성카드|현대카드|전화승인/.test(l))return'카드';
  if(/법인계좌|법인/.test(l))return'법인';
  if(/개인계좌|개인/.test(l))return'개인';
  return'기타';
}

function parseDesc(raw){
  const text=sh(raw||'');
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const txns=[];let dep=0;const memos=[];
  for(const line of lines){
    const dm=line.match(/^(\d{6,8})\s*/);
    if(dm){
      const ds=dm[1];
      let date=ds;
      if(ds.length===8)date=`${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6)}`;
      else if(ds.length===7)date=`${ds.slice(0,4)}-0${ds.slice(4,5)}-${ds.slice(5)}`;
      else if(ds.length===6)date=`${ds.slice(0,4)}-${ds.slice(4)}`;
      const amts=[...line.matchAll(/([0-9,]+)원/g)];
      if(!amts.length)continue;
      const method=gm(line);
      const isRef=/→\s*환불|환불완료|환불해줘야|환급/.test(line);
      // Inline deposit: (청소보증금 N원 포함)
      const di=(line.match(/[（(]청소보증금\s*([0-9,]+)원\s*포함[）)]/)||
                line.match(/청소보증금\s*([0-9,]+)원\s*포함/))?.[1];
      const diAmt=di?pa(di):0;
      // Standalone deposit line
      const isl=/[（(]보증금[）)]/.test(line)||(/청소보증금/.test(line)&&!di&&amts.length===1);
      const name=line.slice(dm[0].length).match(/^([가-힣A-Za-z()_\s\w]+?)(?:\s+(?:개인|법인|신신|카드|국민|\d))/)?.[1]?.trim()||'';
      amts.forEach((m,i)=>{
        const amt=pa(m[1]);if(!amt)return;
        txns.push({date,name,method,amount:amt,isRef,isDep:i===0&&isl,diAmt:i===0?diAmt:0});
      });
      if(isl&&amts[0])dep+=pa(amts[0][1]);
      else if(diAmt)dep+=diAmt;
      continue;
    }
    if(/청소보증금/.test(line)&&/안받았음|생략|면제/.test(line))memos.push('청소보증금 미수취');
    if(/^\*|취소|환불|환급|할인|이슈|재결제/.test(line)){
      const m=line.replace(/^\*+/,'').trim();
      if(m&&m.length<100)memos.push(m);
    }
  }
  const totalIn=txns.filter(t=>!t.isRef).reduce((s,t)=>s+t.amount,0);
  const mv={};
  txns.filter(t=>!t.isRef&&!t.isDep).forEach(t=>mv[t.method]=(mv[t.method]||0)+t.amount);
  const methods=Object.entries(mv).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  return{txns,totalIn,dep,methods:methods.length?methods:['기타'],memos};
}

function parseEv(ev,branch){
  const title=ev.summary||'';
  const date=(ev.start?.date||ev.start?.dateTime||'').slice(0,10);
  let status='기타';
  if(/^\[취소\]/.test(title)||(/취소/.test(title)&&!/예약금/.test(title)))status='취소';
  else if(/완납/.test(title))status='완납';
  else if(/예약금/.test(title))status='예약금';
  const pd=parseDesc(ev.description);
  const o=ov[ev.id]||{};
  return{id:ev.id,date,branch,title,status:o.status||status,
    totalIn:pd.totalIn,dep:pd.dep,methods:pd.methods,txns:pd.txns,
    notes:o.notes!==undefined?o.notes:pd.memos.slice(0,3).join(' / '),
    rawDesc:ev.description||''};
}

function isRel(ev){
  const t=ev.summary||'',d=ev.description||'';
  return/완납|예약금/.test(t)||/\d{7,8}[^\n]*원/.test(d);
}

function hasCowork(){return !!window.cowork?.callMcpTool}
function getGoogleClientId(){return localStorage.getItem(GOOGLE_CLIENT_KEY)||GOOGLE_DEFAULT_CLIENT_ID}

function waitFor(name,check){
  return new Promise((resolve,reject)=>{
    const started=Date.now();
    const timer=setInterval(()=>{
      if(check()){clearInterval(timer);resolve()}
      else if(Date.now()-started>10000){clearInterval(timer);reject(new Error(`${name} 로딩 실패`))}
    },50);
  });
}

async function initGoogle(){
  if(googleReady)return googleReady;
  const clientId=getGoogleClientId();
  if(!clientId)throw new Error('Google OAuth 클라이언트 ID가 필요합니다.');
  googleReady=(async()=>{
    await waitFor('Google OAuth',()=>window.google?.accounts?.oauth2);
    await waitFor('Google API',()=>window.gapi?.load);
    await new Promise(resolve=>gapi.load('client',resolve));
    await gapi.client.init({discoveryDocs:[GOOGLE_DISCOVERY]});
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:GOOGLE_SCOPE,
      callback:()=>{}
    });
  })();
  return googleReady;
}

async function ensureGoogleToken(prompt=''){
  await initGoogle();
  if(gapi.client.getToken()?.access_token)return;
  await new Promise((resolve,reject)=>{
    tokenClient.callback=res=>{
      if(res.error)reject(new Error(res.error));
      else resolve();
    };
    tokenClient.requestAccessToken({prompt});
  });
}

function showGoogleSetup(msg=''){
  const origin=location.origin;
  document.getElementById('tb').innerHTML=`<tr><td colspan="9" class="empty">
    <div class="setup">
      <h2>Google Calendar 연결</h2>
      <p>${msg||'방금 새로 만든 OAuth 2.0 웹 클라이언트 ID를 입력하세요.'}</p>
      <p class="muted">Google Cloud 승인된 JavaScript 원본에는 아래 주소가 정확히 들어가 있어야 합니다.</p>
      <input value="${origin.replace(/"/g,'&quot;')}" readonly onclick="this.select()">
      <input id="googleClientId" value="${getGoogleClientId().replace(/"/g,'&quot;')}" placeholder="새 OAuth 2.0 Client ID">
      <div class="row">
        <button onclick="saveGoogleClient(event)">저장 후 로그인</button>
        <button onclick="clearGoogleClient(event)" style="background:#777">초기화</button>
      </div>
      <p class="muted">클라이언트 ID는 ...apps.googleusercontent.com 으로 끝납니다. 클라이언트 비밀번호는 넣지 않습니다.</p>
    </div>
  </td></tr>`;
}

async function saveGoogleClient(e){
  e.stopPropagation();
  const v=document.getElementById('googleClientId').value.trim();
  if(!v){showGoogleSetup('클라이언트 ID를 입력하세요.');return}
  localStorage.setItem(GOOGLE_CLIENT_KEY,v);
  googleReady=null;tokenClient=null;
  await connectGoogle();
}

function clearGoogleClient(e){
  e.stopPropagation();
  localStorage.removeItem(GOOGLE_CLIENT_KEY);
  googleReady=null;tokenClient=null;
  if(window.gapi?.client)gapi.client.setToken(null);
  showGoogleSetup('저장된 클라이언트 ID를 지웠습니다.');
}

async function connectGoogle(){
  try{
    await ensureGoogleToken('consent');
    await loadAll();
  }catch(e){
    showGoogleSetup(`Google 로그인 실패: ${e.message}`);
  }
}

async function fetchCoworkEvs(calId,year){
  const all=[];let tok=null;
  do{
    const p={calendarId:calId,startTime:`${year}-01-01T00:00:00`,endTime:`${year}-12-31T23:59:59`,pageSize:250,timeZone:'Asia/Seoul'};
    if(tok)p.pageToken=tok;
    const r=await window.cowork.callMcpTool(TOOL,p);
    if(r.isError)break;
    let d;try{d=r.structuredContent??JSON.parse(r.content[0].text)}catch(e){break}
    all.push(...(d.events||[]));tok=d.nextPageToken||null;
  }while(tok);
  return all;
}

async function fetchGoogleEvs(calId,year){
  await ensureGoogleToken('');
  const all=[];let pageToken=null;
  do{
    const r=await gapi.client.calendar.events.list({
      calendarId:calId,
      timeMin:`${year}-01-01T00:00:00+09:00`,
      timeMax:`${year}-12-31T23:59:59+09:00`,
      singleEvents:true,
      orderBy:'startTime',
      maxResults:2500,
      pageToken
    });
    all.push(...(r.result.items||[]));
    pageToken=r.result.nextPageToken||null;
  }while(pageToken);
  return all;
}

async function fetchEvs(calId,year){
  return hasCowork()?fetchCoworkEvs(calId,year):fetchGoogleEvs(calId,year);
}

async function loadAll(){
  const btn=document.getElementById('rb');
  btn.disabled=true;btn.textContent='⏳ 로딩 중...';
  document.getElementById('tb').innerHTML='<tr><td colspan="9" class="loader"><div class="spin"></div>캘린더 데이터 불러오는 중...</td></tr>';
  const year=document.getElementById('sy').value;
  try{
    if(!hasCowork()&&!getGoogleClientId()){showGoogleSetup();return}
    allData=[];
    for(const cal of CALS){
      const evs=await fetchEvs(cal.id,year);
      evs.filter(isRel).forEach(ev=>allData.push(parseEv(ev,cal.name)));
    }
    allData.sort((a,b)=>a.date.localeCompare(b.date));
    render();
  }catch(e){
    if(!hasCowork())showGoogleSetup(`오류: ${e.message}`);
    else document.getElementById('tb').innerHTML=`<tr><td colspan="9" style="color:#c00;padding:20px">오류: ${e.message}</td></tr>`;
  }finally{btn.disabled=false;btn.textContent='🔄 새로고침'}
}

function getFiltered(){
  const mo=document.getElementById('sm').value,br=document.getElementById('sb').value,st=document.getElementById('ss').value;
  return allData.filter(e=>(!mo||e.date.slice(5,7)===mo)&&(!br||e.branch===br)&&(!st||e.status===st));
}

function render(){
  const data=getFiltered();
  const 완납=data.filter(e=>e.status==='완납');
  document.getElementById('ct').textContent=data.length+'건';
  document.getElementById('ca').textContent=fa(완납.reduce((s,e)=>s+e.totalIn,0));
  document.getElementById('cd').textContent=fa(data.reduce((s,e)=>s+e.dep,0));
  document.getElementById('c1').textContent=완납.length+'건';
  document.getElementById('c2').textContent=data.filter(e=>e.status==='예약금').length+'건';
  document.getElementById('c3').textContent=data.filter(e=>e.status==='취소').length+'건';
  if(!data.length){document.getElementById('tb').innerHTML='<tr><td colspan="9" class="empty">해당 데이터 없음</td></tr>';return}
  const rows=[];
  for(const ev of data){
    const isO=open.has(ev.id);
    const bc=ev.branch==='문래점'?'brm':'brs';
    const ms=ev.methods.map(m=>`<span class="bdg m${m}">${m}</span>`).join(' ');
    const dh=ev.dep>0?`<span class="dep">${fa(ev.dep)}</span>`:'<span class="dash">-</span>';
    const ah=ev.totalIn>0?`<span class="amt">${fa(ev.totalIn)}</span>`:'<span class="dash">-</span>';
    const nh=ev.notes?`<span class="note" title="${ev.notes.replace(/"/g,'&quot;')}">${ev.notes}</span>`:'';
    rows.push(`<tr class="er${isO?' open':''}" onclick="tog('${ev.id}')">
      <td style="text-align:center"><span class="arr">▶</span></td>
      <td style="white-space:nowrap">${ev.date}</td>
      <td><span class="${bc}">${ev.branch}</span></td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${ev.title.replace(/"/g,'&quot;')}">${ev.title}</td>
      <td><span class="bdg s${ev.status}">${ev.status}</span></td>
      <td class="r">${ah}</td><td class="r">${dh}</td><td>${ms}</td><td>${nh}</td>
    </tr>`);
    if(isO)rows.push(buildDet(ev));
  }
  document.getElementById('tb').innerHTML=rows.join('');
}

function buildDet(ev){
  const tr=ev.txns.length?ev.txns.map(t=>{
    const n=t.isDep?'🟡 청소보증금':t.diAmt?`(청소보증금 ${fa(t.diAmt)} 포함)`:'';
    return`<tr class="${t.isRef?'rf':''}">
      <td>${t.date}</td><td>${t.name||'-'}</td>
      <td><span class="bdg m${t.method}">${t.method}</span></td>
      <td style="text-align:right;font-weight:600">${fa(t.amount)}</td>
      <td style="font-size:11px;color:${t.isRef?'#c0392b':'#888'}">${t.isRef?'🔴 환불/취소':n}</td>
    </tr>`;
  }).join(''):'<tr><td colspan="5" style="text-align:center;color:#ccc;padding:8px">결제 내역 없음</td></tr>';
  const cur=(ov[ev.id]?.notes!==undefined?ov[ev.id].notes:ev.notes)||'';
  return`<tr class="dr"><td colspan="9"><div class="di">
    <table class="tt">
      <thead><tr><th>날짜</th><th>이름</th><th>방법</th><th style="text-align:right">금액</th><th>비고</th></tr></thead>
      <tbody>${tr}</tbody>
    </table>
    <div class="eb">
      <label>메모 (직접 수정 가능)</label>
      <textarea id="n${ev.id}" onclick="event.stopPropagation()" onkeydown="event.stopPropagation()">${cur}</textarea>
      <button class="sv" onclick="saveN('${ev.id}',event)">저장</button>
    </div>
  </div></td></tr>`;
}

function tog(id){open.has(id)?open.delete(id):open.add(id);render()}

function saveN(id,e){
  e.stopPropagation();
  const val=document.getElementById('n'+id).value;
  if(!ov[id])ov[id]={};ov[id].notes=val;
  try{localStorage.setItem('atm_ov',JSON.stringify(ov))}catch(e){}
  const ev=allData.find(e=>e.id===id);if(ev)ev.notes=val;
  const btn=e.target;btn.textContent='✓ 저장됨';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='저장';btn.classList.remove('ok')},2000);
}

function doExport(){
  const data=getFiltered();
  const H=['행사일','지점','행사명','상태','입금총액','청소보증금','결제방법','메모'];
  const rows=data.map(e=>[
    e.date,e.branch,`"${e.title.replace(/"/g,'""')}"`,e.status,
    e.totalIn||0,e.dep||0,e.methods.join('+'),`"${(e.notes||'').replace(/"/g,'""')}"`
  ]);
  const csv='﻿'+[H.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`올댓마인드_입금관리_${document.getElementById('sy').value}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

if(sessionStorage.getItem(ACCESS_KEY)==='1')showApp();
</script>
