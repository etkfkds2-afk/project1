<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>올댓마인드 입금관리</title>
<style>
:root{
  color-scheme:light;
  --bg:#f6f7f9;
  --panel:#fff;
  --panel-soft:#fafbfc;
  --text:#17202a;
  --muted:#6b7280;
  --line:#e5e7eb;
  --line-strong:#d1d5db;
  --blue:#2563eb;
  --green:#059669;
  --amber:#d97706;
  --red:#dc2626;
  --shadow:0 10px 24px rgba(15,23,42,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.hdr{background:var(--panel);color:var(--text);padding:22px 28px 18px;border-bottom:1px solid var(--line)}
.hdr h1{font-size:24px;font-weight:800;letter-spacing:0}
.hdr .sub{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:700}
.toolbar{background:rgba(255,255,255,.96);padding:14px 28px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
select,.search{height:38px;border:1px solid var(--line-strong);border-radius:6px;padding:0 12px;font-size:13px;background:#fff;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
select{cursor:pointer;min-width:112px;padding-right:24px}
select:focus,.search:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.search{width:240px}
.sp{flex:1 1 24px}
.btn{height:38px;padding:0 14px;border:1px solid transparent;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,border-color .15s,color .15s,box-shadow .15s}
.btn:hover{box-shadow:0 3px 10px rgba(15,23,42,.08)}
.btn:active{box-shadow:none}
.btn:disabled{opacity:.45;cursor:default;box-shadow:none}
.btn-reload,.btn-hidden{background:#fff;color:#374151;border-color:var(--line-strong)}
.btn-reload:hover,.btn-hidden:hover{background:#f9fafb}
.btn-undo{background:#fff;color:#6366f1;border-color:#c7d2fe}
.btn-undo:hover:not(:disabled){background:#eef2ff;border-color:#a5b4fc}
.btn-undo:disabled{color:#c7d2fe;border-color:#e0e7ff;cursor:default}
.btn-add{background:#111827;color:#fff;border-color:#111827}
.btn-add:hover{background:#1f2937}
.btn-export{background:var(--green);color:#fff;border-color:var(--green)}
.btn-danger{background:#fff;color:var(--red);border-color:#fecaca}
.btn-danger:hover{background:#fef2f2}
.btn-hidden.active{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;padding:18px 28px}
.card{background:var(--panel);border-radius:8px;padding:12px 14px;border:1px solid var(--line);box-shadow:0 4px 14px rgba(15,23,42,.04);transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--line-strong);box-shadow:var(--shadow)}
.card.bl{border-top:3px solid var(--blue)}.card.gr{border-top:3px solid var(--green)}.card.or{border-top:3px solid var(--amber)}
.card.pu{border-top:3px solid var(--blue)}.card.rd{border-top:3px solid var(--red)}
.card .lbl{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700}
.card .val{font-size:21px;font-weight:850;color:var(--text);font-variant-numeric:tabular-nums}
.card .val .count{display:block;font-size:18px;line-height:1.15}
.card .val .money{display:block;font-size:16px;line-height:1.25;margin-top:3px;white-space:nowrap}
.card.bl .val{color:var(--blue)}.card.gr .val{color:var(--green)}.card.or .val{color:#ea580c}
.card.pu .val{color:#6d28d9}.card.rd .val{color:#b91c1c}
.tw{padding:0 28px 44px;overflow-x:auto}
.paygrid{width:100%;min-width:1450px;background:var(--panel);border-radius:8px;box-shadow:var(--shadow);border-collapse:separate;border-spacing:0;border:1px solid var(--line);table-layout:fixed;overflow:hidden}
.ghead{background:var(--panel-soft)}
.grow{background:#fff}
.grow:hover{background:#fbfdff}
.gcell{padding:12px 12px;vertical-align:middle;border-bottom:1px solid #eef0f3;border-right:1px solid #eef0f3;white-space:nowrap;overflow:hidden;font-size:13px;color:var(--text)}
.gcell:last-child{border-right:none}
.ghead .gcell,.ghead .gcell.r{font-size:12px;font-weight:800;color:#4b5563;text-align:center;background:var(--panel-soft);border-bottom:1px solid var(--line-strong);height:44px}
.gcell.r{text-align:right}
.hchip{display:inline-block;padding:2px 0}
.gridmsg{padding:64px;text-align:center;color:#8b95a1;font-size:14px}
.bdg{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}
.s완납{background:#ecfdf5;color:#047857;border:1px solid #a7f3d0}
.s예약금입금{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.s취소{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.s환불{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
.s기타{background:#f3f4f6;color:#4b5563;border:1px solid #e5e7eb}
.m카드{background:#eff6ff;color:#1d4ed8}.m세금계산서{background:#f5f3ff;color:#6d28d9}
.m현금{background:#ecfdf5;color:#047857}.m기타{background:#f3f4f6;color:#4b5563}
.brm{color:#2563eb;font-weight:800}.brs{color:#7c3aed;font-weight:800}
.amt{font-weight:850;font-variant-numeric:tabular-nums;color:#111827}
.dep{font-weight:500;font-variant-numeric:tabular-nums;color:#8b95a1;font-size:12px}
.dep-label{font-weight:700;color:#4f46e5;font-size:12px}
.moneycell,.datecell,.statuscell,.paycell{white-space:nowrap}
.paycell{white-space:normal;text-align:center;overflow:visible}
.paycell .bdg{width:100%;max-width:112px;min-height:30px;padding:5px 8px;white-space:normal;word-break:keep-all;overflow-wrap:anywhere;text-align:center;line-height:1.25}
.paycell .editcell{white-space:normal;justify-content:center;text-align:center;overflow-wrap:anywhere}
.date2{font-size:13px;line-height:1.45;position:relative}
.date2 .sub{display:block;color:#8b95a1;font-size:12px;margin-top:3px}
.bal2row{margin-top:5px;padding-top:4px;border-top:1px dashed #e2e8f0;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.bal2lbl{color:#94a3b8;font-size:11px;font-weight:700}
.bal2rm{border:none;background:transparent;color:#cbd5e1;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;font-weight:700;transition:color .15s}
.bal2rm:hover{color:#ef4444}
.bal2add{position:absolute;bottom:-2px;right:0;border:1px dashed #cbd5e1;background:#fff;color:#94a3b8;cursor:pointer;font-size:10px;padding:1px 5px;border-radius:4px;line-height:1.4;transition:all .15s;opacity:0;pointer-events:none}
.bal2add:hover{border-color:#6366f1;color:#6366f1;background:#eef2ff}
.gcell:hover .bal2add{opacity:1;pointer-events:auto}
.oktxt{color:var(--green);font-weight:700}.waittxt{color:var(--amber);font-weight:700}.badtxt{color:var(--red);font-weight:700}
.statuscell{text-align:center;padding-left:6px;padding-right:6px;overflow:visible}
.statusselect{display:block;width:102px;max-width:100%;height:30px;margin:0 auto;border-radius:999px;border:1px solid transparent;padding:0 6px;font-size:12px;font-weight:800;text-align:center;outline:none;cursor:pointer}
.statusselect:focus{box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.dash{color:#b8c0cc}
.note{font-size:12px;color:#55606e;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;overflow:hidden}
.note.editing{display:block;-webkit-line-clamp:unset;overflow:visible}
.gcell.notecell{white-space:normal;overflow:hidden}
.editcell{display:inline-flex;align-items:center;max-width:100%;padding:4px 7px;border-radius:5px;cursor:text;white-space:nowrap;transition:background .15s,box-shadow .15s;min-height:28px}
.areacell{white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;line-height:1.45;align-items:flex-start;width:100%}
.notecell .areacell{display:block}
.editcell.editingcell{padding:0;min-height:0;background:transparent;box-shadow:none}
.editcell.editingcell:hover{background:transparent;box-shadow:none}
.editcell:hover{background:#f3f6fb;box-shadow:inset 0 0 0 1px #cbd5e1}
.editinp{width:100%;min-width:64px;height:28px;border:2px solid var(--blue);border-radius:6px;padding:0 8px;font:inherit;background:#fff;outline:none}
.editarea{width:100%;height:32px;max-height:180px;border:2px solid var(--blue);border-radius:6px;padding:4px 8px;font:inherit;background:#fff;resize:vertical;line-height:1.45;outline:none;white-space:pre-wrap;overflow-y:auto}
.editnum{text-align:right}
.titlecell{display:flex;align-items:flex-start;gap:8px;white-space:normal;min-width:0;width:100%}
.titletext{display:inline-block;flex:1;min-width:0;white-space:normal;max-width:none;overflow:visible;text-overflow:clip;vertical-align:middle;line-height:1.45}
.titletext .editcell{white-space:normal;align-items:flex-start}
.rawbtn,.mini{border:1px solid var(--line-strong);background:#fff;color:#4b5563;border-radius:6px;height:26px;padding:0 9px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s,color .15s}
.rawbtn:hover,.mini:hover{background:#f9fafb;color:#111827;border-color:#9ca3af}
.delbtn{border:1px solid transparent;background:transparent;color:#cbd5e1;cursor:pointer;font-size:12px;padding:4px 7px;border-radius:5px;line-height:1.2;font-weight:800;transition:all .15s}
.grow:hover .delbtn{color:#ef4444}
.delbtn:hover{background:#fef2f2;border-color:#fecaca;color:#dc2626}
.restbtn{border:1px solid #bbf7d0;background:#f0fdf4;color:#15803d;cursor:pointer;font-size:12px;padding:4px 8px;border-radius:5px;font-weight:800;transition:all .15s}
.restbtn:hover{background:#dcfce7}
.actioncell{text-align:center}
.hidden-row{opacity:.48}
.chkcell{width:36px;text-align:center;padding:8px 4px}
.rowchk{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
.modal{position:fixed;inset:0;background:rgba(17,24,39,.58);display:none;align-items:center;justify-content:center;padding:24px;z-index:100;backdrop-filter:blur(4px)}
.modal.show{display:flex}
.modal-card{width:min(760px,100%);max-height:86vh;overflow:auto;background:#fff;border-radius:8px;box-shadow:0 25px 60px rgba(0,0,0,.28)}
.modal-hd{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal-hd h2{font-size:18px;color:var(--text);flex:1;font-weight:800}
.modal-bd{padding:20px;line-height:1.6}
.rawmeta{display:grid;grid-template-columns:100px 1fr;gap:10px 16px;margin-bottom:20px;font-size:13px}
.rawmeta b{color:var(--muted)}
.rawdesc{white-space:pre-wrap;background:#f9fafb;border:1px solid var(--line);border-radius:8px;padding:16px;color:#374151;font-size:13px;line-height:1.6}
.loader{text-align:center;padding:55px;color:#9ca3af}
.spin{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px;color:#9ca3af}
.locked .app{display:none}
.auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-box{width:100%;max-width:380px;background:#fff;border-radius:8px;box-shadow:var(--shadow);border:1px solid var(--line);padding:26px}
.auth-box h1{font-size:20px;margin-bottom:6px;color:var(--text)}
.auth-box p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.auth-box input{width:100%;height:40px;border:1px solid var(--line-strong);border-radius:6px;padding:0 10px;font-size:14px;outline:none}
.auth-box input+input{margin-top:8px}
.auth-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.auth-box button{width:100%;height:40px;margin-top:10px;border:0;border-radius:6px;background:var(--text);color:#fff;font-weight:800;cursor:pointer}
.auth-err{min-height:17px;margin-top:8px;color:var(--red);font-size:12px}
.setup{max-width:560px;margin:0 auto;text-align:left;color:#4b5563;line-height:1.5}
.setup h2{font-size:16px;color:var(--text);margin-bottom:6px}
.setup p{font-size:12px;margin-bottom:10px}
.setup input{width:100%;height:36px;border:1px solid var(--line-strong);border-radius:6px;padding:0 10px;font-size:12px;outline:none}
.setup input:focus{border-color:var(--blue)}
.setup .row{display:flex;gap:8px;margin-top:8px}
.setup .row button{height:36px;border:0;border-radius:6px;background:var(--text);color:#fff;font-weight:800;padding:0 12px;cursor:pointer;white-space:nowrap}
.setup .muted{font-size:11px;color:var(--muted)}
@media (max-width:1100px){
  .cards{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media (max-width:760px){
  body{font-size:13px;background:#f3f4f6}
  .hdr{padding:18px 20px 14px}
  .hdr h1{font-size:22px}
  .toolbar{position:static;padding:12px 20px;gap:8px}
  .toolbar select{flex:1 1 calc(50% - 4px);min-width:0}
  .toolbar .search{width:100%;flex:1 1 100%}
  .sp{display:none}
  .btn{flex:1 1 calc(50% - 4px);height:40px;padding:0 10px}
  .btn-add{flex-basis:100%}
  .btn-export{flex-basis:100%}
  .cards{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:14px 20px}
  .card{padding:12px;border-radius:8px}
  .card .lbl{font-size:11px;margin-bottom:5px}
  .card .val{font-size:20px}
  .card .val .count{font-size:18px}
  .card .val .money{font-size:15px}
  .tw{padding:0 20px 32px;overflow:visible}
  .paygrid{display:block;min-width:0;width:100%;border:0;background:transparent;box-shadow:none}
  .paygrid colgroup,.paygrid thead{display:none}
  .paygrid tbody{display:grid;gap:12px}
  .paygrid .grow{display:block;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:0 6px 18px rgba(15,23,42,.06);overflow:hidden}
  .paygrid .gcell{display:grid;grid-template-columns:96px minmax(0,1fr);gap:10px;align-items:center;width:100%;min-height:42px;padding:10px 12px;border-right:0;border-bottom:1px solid #eef0f3;white-space:normal;overflow:visible;text-align:left}
  .paygrid .gcell::before{content:attr(data-label);font-size:11px;color:var(--muted);font-weight:800}
  .paygrid .gcell.chkcell{display:flex;justify-content:space-between;gap:10px;background:#fafafa}
  .paygrid .gcell.chkcell::before{content:"선택"}
  .paygrid .gcell.actioncell{display:flex;justify-content:flex-end;background:#fafafa;border-bottom:0}
  .paygrid .gcell.actioncell::before{display:none}
  .paygrid .gcell.r{text-align:left}
  .titlecell{min-width:0;white-space:normal}
  .titletext{max-width:none;white-space:normal}
  .editcell{white-space:normal;min-width:0}
  .notecell .areacell{white-space:pre-wrap}
  .notecell .editarea{height:23px;padding:1px 6px}
  .moneycell .editcell,.datecell .editcell,.statuscell .editcell,.paycell .editcell{white-space:nowrap}
  .paycell .editcell{white-space:normal;justify-content:center;text-align:center;overflow-wrap:anywhere}
  .note{-webkit-line-clamp:3}
  .rawmeta{grid-template-columns:78px 1fr}
  .modal{padding:14px}
}
/* ── 탭 ── */
.view-tabs{display:flex;gap:4px;margin-right:4px}
.vtab{height:36px;padding:0 16px;border:1px solid var(--line-strong);border-radius:6px;background:#fff;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.vtab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
/* ── 분석 뷰 ── */
#view-chart{padding:24px 28px 48px;display:none}
.an-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.an-kpi-card{background:var(--panel);border-radius:10px;border:1px solid var(--line);padding:18px 20px;box-shadow:var(--shadow)}
.an-kpi-card .ak-lbl{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.4px;margin-bottom:6px}
.an-kpi-card .ak-val{font-size:26px;font-weight:850;font-variant-numeric:tabular-nums;line-height:1.1}
.ak-val.green{color:var(--green)}.ak-val.amber{color:var(--amber)}.ak-val.red{color:var(--red)}
.an-kpi-card .ak-sub{font-size:11px;color:var(--muted);margin-top:5px;margin-bottom:10px}
.an-kpi-card .ak-divider{border:none;border-top:1px solid var(--line);margin:0}
.an-kpi-card .ak-branches{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
.ak-br-row{display:flex;flex-direction:column;gap:2px;background:var(--bg);border-radius:7px;padding:8px 10px}
.ak-br-name{font-size:11px;font-weight:700;letter-spacing:.3px}
.ak-br-val{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
/* 섹션 공통 */
.an-section{background:var(--panel);border-radius:10px;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.an-section:last-child{margin-bottom:0}
.an-sec-hdr{padding:18px 22px 0;border-bottom:1px solid var(--line);padding-bottom:14px}
.an-sec-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px}
.an-sec-sub{font-size:12px;color:var(--muted)}
.an-sec-hdr-row{display:flex;align-items:baseline;justify-content:space-between}
.an-sec-total{font-size:16px;font-weight:850;color:var(--green);font-variant-numeric:tabular-nums}
/* 차트 */
.an-chart-body{padding:20px 22px 16px;position:relative;height:340px}
/* 실입금 테이블 */
.cf-table{width:100%;border-collapse:collapse;font-size:13px}
.cf-thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:800;color:#6b7280;background:#f8fafc;border-bottom:1px solid var(--line);white-space:nowrap}
.cf-thead th.r{text-align:right}
.cf-mrow{cursor:pointer;user-select:none}
.cf-mrow td{padding:9px 16px;background:#f1f5f9;font-size:12px;font-weight:800;color:#374151;border-top:1px solid var(--line)}
.cf-mrow:hover td{background:#e8edf5}
.cf-mtotal{font-size:13px;color:#111827;font-variant-numeric:tabular-nums;margin-left:10px}
.cf-mempty{color:#b0b8c4;font-weight:500;margin-left:8px}
.cf-mcnt{font-size:11px;color:#9ca3af;font-weight:500;margin-left:4px}
.cf-arrow{float:right;color:#9ca3af;font-size:10px;transition:transform .2s}
.cf-mrow.open .cf-arrow{transform:rotate(180deg)}
.cf-body{display:none}.cf-body.open{display:table-row-group}
.cf-row{background:#fff}.cf-row:hover{background:#f8faff}
.cf-row td{padding:10px 14px;border-bottom:1px solid #f1f3f6;vertical-align:middle;white-space:nowrap}
.cf-row:last-child td{border-bottom:none}
.cf-td-date{font-size:12px;color:#6b7280;font-variant-numeric:tabular-nums;width:96px}
.cf-td-title{font-weight:600;white-space:normal;line-height:1.4;min-width:120px}
.cf-td-title .titlecell{gap:6px;align-items:center;flex-wrap:wrap}
.cf-td-title .titlecell .rawbtn{flex-shrink:0}
.cf-td-evdate{font-size:12px;color:#9ca3af;width:90px}
.cf-td-lbl{text-align:center;width:56px}
.cf-ilbl{display:inline-block;font-size:11px;font-weight:700;border-radius:4px;padding:2px 7px;white-space:nowrap}
.cf-ilbl[onclick]{cursor:pointer}
.cf-ilbl[onclick]:hover{filter:brightness(.92)}
.cf-ilbl.bal{color:#6d28d9;background:#f5f3ff;border:1px solid #ddd6fe}
.cf-ilbl.res{color:#0369a1;background:#e0f2fe;border:1px solid #bae6fd}
.cf-td-amt{text-align:right;font-weight:850;font-size:14px;font-variant-numeric:tabular-nums;color:#111827;width:110px}
.cf-td-method{font-size:12px;color:#9ca3af;text-align:center;width:78px}
.cf-td-br{font-size:12px;font-weight:800;text-align:right;width:64px}
.cf-td-action{text-align:center;width:58px}
.cf-add{background:none;border:none;padding:0 4px;margin-left:6px;cursor:pointer;font-size:15px;opacity:0;pointer-events:none;transition:opacity .15s;vertical-align:middle;line-height:1}
.cf-mrow:hover .cf-add{opacity:1;pointer-events:auto}

<script>
const ACCESS_USER='admin0221';
const ACCESS_HASH='6ed178d23d6ca5f22708b85244b2b368f9e837bfabfa3a43617408f3a3ef5fd6';
const ACCESS_KEY='atm_payment_access_ok';
const GOOGLE_CLIENT_KEY='atm_google_client_id_v2';
const OV_KEY='payment_overrides';
const GC_KEY='google_client_id';
const CONTACTS_KEY='customer_contacts';
const OV_API='/api/overrides';
const MANUAL_ROWS_KEY='__manualRows';
const GOOGLE_DEFAULT_CLIENT_ID='';
const GOOGLE_SCOPE='https://www.googleapis.com/auth/calendar.readonly';
const GOOGLE_DISCOVERY='https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
const CALS=[
  {id:'atmind0361@gmail.com',name:'문래점'},
  {id:'1824a066dc6b3d4d7f89ae11beaf22d7f24c78856a04552a3a03ce3200b7fbd2@group.calendar.google.com',name:'신논현점'}
];
const TOOL='mcp__7562d3df-f0a0-4481-87e0-f6c4660717b3__list_events';
let allData=[], ov={}, contacts={};
let ovHistory=[], contactsHistory=[], _undoing=false;
let customerAllData=null;
let remoteContactsReady=false;
let custSortKey='visits', custSortAsc=false;
let refreshTimer=null;
let showHidden=false;
let selectedIds=new Set();
let googleReady=null, tokenClient=null;
let remoteOvReady=false;
let remoteOvUpdatedAt=null;
let saveConflictNotified=false;
let lastOvSave=Promise.resolve();
const open=new Set();
try{ov=JSON.parse(localStorage.getItem('atm_ov')||'{}')}catch(e){}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function manualRows(){return Array.isArray(ov[MANUAL_ROWS_KEY])?ov[MANUAL_ROWS_KEY]:[]}
function setManualRows(rows){ov[MANUAL_ROWS_KEY]=rows}
function makeManualRow(src={}){
  const year=document.getElementById('sy')?.value||String(new Date().getFullYear());
  const date=src.date||`${year}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
  const branch=normalizeBranch(src.branch||document.getElementById('sb')?.value||'문래점');
  const reservationAmount=Number(src.reservationAmount??src.amount)||0;
  const balanceAmount=Number(src.balanceAmount)||0;
  const methods=String(src.methodsText||src.method||'현금').split(/[,+/ ]+/).map(s=>s.trim()).filter(Boolean);
  const dep=Number(src.dep)||pa(src.depText)||0;
  const isCash=methods.includes('현금');
  const gross=reservationAmount+balanceAmount;
  return{
    id:src.id||`manual_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    manual:true,date,branch,title:src.title||'직접 입력',status:src.payStatus||'완납',payStatus:src.payStatus||'완납',
    totalIn:gross,netIn:src.netIn!==undefined?Number(src.netIn)||0:Math.max(0,isCash?gross-dep:gross),
    dep,depText:src.depText||'',methods:methods.length?methods:['현금'],txns:[],
    _actualReservation:reservationAmount,_actualBalance:balanceAmount,
    reservationDate:src.reservationDate||date,reservationAmount,
    balanceDate:src.balanceDate||'',balanceAmount,balanceDiAmt:0,reservationDiAmt:0,
    notes:src.notes||'',rawTitle:src.rawTitle||'직접 추가한 행',rawDesc:src.rawDesc||'',rawStart:date,rawEnd:date,rawBranch:branch,
    hidden:!!src.hidden
  };
}
function addManualRowsToData(){
  const rows=manualRows().map(r=>applyOverrides(makeManualRow(r),ov[r.id]||{}));
  allData.push(...rows);
}
function persistManualRow(row){
  const rows=manualRows();
  const idx=rows.findIndex(r=>r.id===row.id);
  const saved={
    id:row.id,date:row.date,branch:row.branch,title:row.title,payStatus:row.payStatus,
    reservationDate:row.reservationDate,reservationAmount:Number(row.reservationAmount)||0,
    balanceDate:row.balanceDate,balanceAmount:Number(row.balanceAmount)||0,
    dep:Number(row.dep)||0,depText:row.depText||'',netIn:Number(row.netIn)||0,
    methodsText:(row.methods||[]).join('+'),notes:row.notes||'',hidden:!!row.hidden
  };
  if(idx>=0)rows[idx]=saved;
  else rows.push(saved);
  setManualRows(rows);
}
async function loadRemoteOv(){
  try{
    await lastOvSave;
    const res=await fetch(`${OV_API}?key=${encodeURIComponent(OV_KEY)}`,{cache:'no-store'});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(data&&data.value&&typeof data.value==='object'){
      const remoteEmpty=Object.keys(data.value).length===0;
      const localHasData=Object.keys(ov).length>0;
      if(remoteEmpty&&localHasData){
        remoteOvUpdatedAt=data.updated_at||null;
        remoteOvReady=true;
        saveOv();
        await lastOvSave;
      }else{
        ov=data.value;
        remoteOvUpdatedAt=data.updated_at||null;
      }
    }
    remoteOvReady=true;
    try{localStorage.setItem('atm_ov',JSON.stringify(ov))}catch(e){}
  }catch(e){
    remoteOvReady=false;
    console.warn('D1 저장소를 사용할 수 없어 이 브라우저 저장소를 사용합니다.',e);
  }
}
let _lastHistoryTs=0;
function pushHistory(){
  if(_undoing)return;
  const now=Date.now();
  if(now-_lastHistoryTs<80)return; // 80ms 내 연속 호출은 같은 액션으로 취급
  _lastHistoryTs=now;
  ovHistory.push({ov:JSON.parse(JSON.stringify(ov)),allData:JSON.parse(JSON.stringify(allData))});
  if(ovHistory.length>20)ovHistory.shift();
  updateUndoBtn();
}
function updateUndoBtn(){
  const isCust=currentView==='customer';
  const cnt=isCust?contactsHistory.length:ovHistory.length;
  document.querySelectorAll('.undobtn').forEach(btn=>{
    btn.disabled=cnt===0;
    btn.textContent=`뒤로가기${cnt?` (${cnt})`:''}`;
  });
}
function undoLast(){
  if(currentView==='customer'){undoLastContacts();return;}
  if(!ovHistory.length)return;
  _undoing=true;
  const snap=ovHistory.pop();
  ov=snap.ov;
  allData=snap.allData;
  saveOv();
  render();
  if(currentView==='chart')renderChart();
  _undoing=false;
  updateUndoBtn();
}
function saveOv(){
  try{localStorage.setItem('atm_ov',JSON.stringify(ov))}catch(e){}
  if(!remoteOvReady)return;
  const payload=JSON.stringify({key:OV_KEY,value:ov,updated_at:remoteOvUpdatedAt});
  lastOvSave=lastOvSave.then(async()=>{
    const res=await fetch(OV_API,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:payload
    });
    if(res.status===409){
      remoteOvReady=false;
      if(!saveConflictNotified){
        saveConflictNotified=true;
        alert('다른 브라우저에서 먼저 저장한 변경사항이 있습니다. 새로고침 후 다시 수정하세요.');
      }
      throw new Error('Remote override conflict');
    }
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json().catch(()=>null);
    remoteOvUpdatedAt=data?.updated_at||remoteOvUpdatedAt;
  }).catch(e=>console.warn('D1 저장 실패. 이 브라우저에는 저장되었습니다.',e));
}
function cleanNum(v){return pa(String(v||'').replace(/[^\d,]/g,''))}
function moneyVal(v){return typeof v==='number'?v:pa(v)}
function normStatus(v){return v==='예약금'?'예약금 입금':v}
function normalizeBranch(branch){
  const b=String(branch||'').trim();
  if(/문래/.test(b))return'문래점';
  if(/신논현/.test(b))return'신논현점';
  return b||'미분류';
}
function setOv(id,key,val){
  pushHistory();
  if(!ov[id])ov[id]={};
  ov[id][key]=val;
  const ev=allData.find(e=>e.id===id);
  if(ev){
    if(key==='methodsText'){
      ev.methods=String(val||'').split(/[,+/ ]+/).map(s=>s.trim()).filter(Boolean);
    }else if(key==='depText'){
      ev.depText=val;
      ev.dep=pa(val);
    }else if(key==='branch'){
      ev[key]=normalizeBranch(val);
    }else if(key==='netIn'){
      ev.netIn=Number(val)||0;
    }else{
      ev[key]=key==='payStatus'?normStatus(val):val;
    }
    if(['reservationAmount','balanceAmount','balanceAmount2','depText','dep','methodsText','reservationDate','balanceDate','balanceDate2','payStatus'].includes(key)){
      delete ov[id].netIn;
    }
    // 예약금/잔금 → 총입금액 연쇄
    if(key==='reservationAmount'||key==='balanceAmount'||key==='balanceAmount2'){
      ev.totalIn=(Number(ev.reservationAmount)||0)+(Number(ev.balanceAmount)||0)+(Number(ev.balanceAmount2)||0);
      delete ov[id].netIn;
    }
    // _actual* 동기: 수동 수정 시 실제 입금액도 갱신
    if(key==='reservationAmount') ev._actualReservation=pa(val);
    if(key==='balanceAmount') ev._actualBalance=pa(val);
    if(key==='balanceAmount2') ev.balanceAmount2=pa(val);
    if(key==='balanceDate2') ev.balanceDate2=val;
    // 총입금액/청소보증금/결제방법 → 실수입 연쇄
    if(key!=='netIn'){
      const _isCash=(ev.methods||[]).includes('현금');
      const _ra=key==='reservationAmount'?pa(val):(ev._actualReservation||0);
      const _ba=key==='balanceAmount'?pa(val):(key==='balanceDate'&&val&&val!=='입금 예정'?ev.balanceAmount:(ev._actualBalance||0));
      const _ba2=key==='balanceAmount2'?pa(val):(ev.balanceAmount2||0);
      const _dep=key==='depText'||key==='dep'?pa(val):(ev.dep||0);
      ev.netIn=Math.max(0,_isCash?(_ra+_ba+_ba2)-_dep:(_ra+_ba+_ba2));
    }
    if(ev.manual)persistManualRow(ev);
  }
  saveOv();
}
function applyOverrides(row,o){
  ['date','branch','title','payStatus','reservationDate','balanceDate','balanceDate2','notes','depText'].forEach(k=>{
    if(o[k]!==undefined)row[k]=k==='payStatus'?normStatus(o[k]):(k==='branch'?normalizeBranch(o[k]):o[k]);
  });
  ['reservationAmount','balanceAmount','balanceAmount2','dep','totalIn','netIn'].forEach(k=>{
    if(o[k]!==undefined)row[k]=Number(o[k])||0;
  });
  if(o.methodsText!==undefined)row.methods=String(o.methodsText).split(/[,+/ ]+/).map(s=>s.trim()).filter(Boolean);
  if(o.hidden!==undefined)row.hidden=!!o.hidden;

  // depText -> dep sync
  if(o.depText!==undefined) row.dep=pa(o.depText);
  row.branch=normalizeBranch(row.branch);

  // 예약금/잔금 오버라이드 → 총입금액 재계산 + _actual* 동기
  if(o.reservationAmount!==undefined||o.balanceAmount!==undefined||o.balanceAmount2!==undefined)
    row.totalIn=(row.reservationAmount||0)+(row.balanceAmount||0)+(row.balanceAmount2||0);
  if(o.reservationAmount!==undefined) row._actualReservation=Number(o.reservationAmount)||0;
  if(o.balanceAmount!==undefined) row._actualBalance=Number(o.balanceAmount)||0;

  if(o.netIn===undefined){
    const _isCash=(row.methods||[]).includes('현금');
    const _ra=o.reservationAmount!==undefined?Number(o.reservationAmount)||0:(row._actualReservation||0);
    const _ba=o.balanceAmount!==undefined?Number(o.balanceAmount)||0:(row._actualBalance||0);
    const _ba2=o.balanceAmount2!==undefined?Number(o.balanceAmount2)||0:(row.balanceAmount2||0);
    const _g=_ra+_ba+_ba2;
    row.netIn=Math.max(0,_isCash?_g-(row.dep||0):_g);
  }
  return row;
}

async function sha256(text){
  const data=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest('SHA-256',data);
  return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function sh(s){
  return(s||'')
    .replace(/<br\s*\/?>/gi,'\n').replace(/<p[^>]*>/gi,'\n').replace(/<\/p>/gi,'')
    .replace(/<[biu][^>]*>(.*?)<\/[biu]>/gi,'$1').replace(/<[^>]+>/g,' ')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}
function pa(s){return parseInt(String(s||'').replace(/,/g,''))||0}
function fa(n){return n?n.toLocaleString('ko-KR')+'원':'-'}
function gm(l){
  if(/신신페이|카드결제|카드\s*결제|국민카드|삼성카드|현대카드|전화승인/.test(l))return'카드';
  if(/법인계좌|법인|세금계산서|계산서/.test(l))return'세금계산서';
  if(/개인계좌|개인|현금/.test(l))return'현금';
  return'기타';
}
function pk(line){
  if(/예약금/.test(line))return'예약금';
  if(/잔금|완납|나머지|차액/.test(line))return'잔금';
  return'';
}
function plannedPay(line,label){
  const re=new RegExp(`${label}\\s*[:：]?\\s*([0-9,]+)원`);
  return pa(line.match(re)?.[1]||'');
}
function includedDeposit(line){
  return pa((line.match(/[（(]청소보증금\s*([0-9,]+)원\s*포함[）)]/)||
             line.match(/청소보증금\s*([0-9,]+)원\s*포함/)||
             line.match(/보증금\s*([0-9,]+)원\s*포함/))?.[1]||'');
}
function stripPlannedPays(line){
  return line
    .replace(/예약금\s*[:：]?\s*[0-9,]+원(?:\s*[→(（][^,\n]*)?/g,'')
    .replace(/잔금\s*[:：]?\s*[0-9,]+원(?:\s*[→(（][^,\n]*)?/g,'');
}

function parseDesc(raw,year=''){
  const text=sh(raw||'');
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const txns=[];let dep=0;const memos=[];let plannedReservation=0,plannedBalance=0,plannedDeposit=0;
  for(const line of lines){
    const memoMatch=line.match(/^\*+\s*(.+)$/)||line.match(/^공지\s*[:：]\s*(.+)$/);
    if(memoMatch){
      const m=memoMatch[1].trim();
      if(m)memos.push(m);
      continue;
    }
    plannedReservation=plannedReservation||plannedPay(line,'예약금');
    plannedBalance=plannedBalance||plannedPay(line,'잔금');
    plannedDeposit=plannedDeposit||includedDeposit(line);
    const dm=line.match(/^(\d{4,8})\s*/);
    if(dm){
      const ds=dm[1];
      let date=ds;
      if(ds.length===8)date=`${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6)}`;
      else if(ds.length===7)date=`${ds.slice(0,4)}-0${ds.slice(4,5)}-${ds.slice(5)}`;
      else if(ds.length===6)date=`${ds.slice(0,4)}-${ds.slice(4)}`;
      else if(ds.length===4){const y=year||String(new Date().getFullYear());date=`${y}-${ds.slice(0,2)}-${ds.slice(2)}`;}
      else continue;
      const txnLine=line;
      const method=gm(txnLine);
      const kind=pk(txnLine);
      const isRef=/→\s*환불|환불완료|환불해줘야|환급/.test(line);
      // Inline deposit: (청소보증금 N원 포함)
      const diAmt=includedDeposit(line);
      // Strip deposit annotation before scanning amounts to avoid double-counting
      const lineForAmts=diAmt?txnLine.replace(/[（(]청소보증금\s*[0-9,]+원\s*포함[）)]/,'').replace(/청소보증금\s*[0-9,]+원\s*포함/,'').replace(/보증금\s*[0-9,]+원\s*포함/,''):txnLine;
      const amts=[...lineForAmts.matchAll(/([0-9,]+)원/g)];
      if(!amts.length)continue;
      // Standalone deposit line (exclude cases where 청소보증금 is a memo note with Korean particle)
      const isl=/[（(]보증금[）)]/.test(txnLine)||(/청소보증금/.test(txnLine)&&!/청소보증금\s*[은는이가을를]/.test(txnLine)&&!diAmt&&amts.length===1);
      const name=txnLine.slice(dm[0].length).match(/^([가-힣A-Za-z()_\s\w]+?)(?:\s+(?:개인|법인|신신|카드|국민|\d))/)?.[1]?.trim()||'';
      let prevEnd=dm[0].length;
      const mixedCorpCash=/법인계좌|법인|세금계산서|계산서/.test(txnLine)&&/개인계좌|개인|현금/.test(txnLine)&&amts.length>1;
      amts.forEach((m,i)=>{
        const amt=pa(m[1]);if(!amt)return;
        const seg=lineForAmts.slice(prevEnd,m.index+m[0].length);
        const localMethod=gm(seg)==='기타'?method:gm(seg);
        const personalDeposit=mixedCorpCash&&localMethod==='현금';
        txns.push({date,name,method:localMethod,kind,amount:amt,isRef,isDep:(i===0&&isl)||personalDeposit,diAmt:i===0?diAmt:0});
        prevEnd=m.index+m[0].length;
      });
      if(isl&&amts[0])dep+=pa(amts[0][1]);
      else if(diAmt)dep+=diAmt;
      else if(mixedCorpCash)dep+=txns.filter(t=>t.date===date&&t.isDep&&t.method==='현금').reduce((s,t)=>s+t.amount,0);
      continue;
    }
  }
  const totalIn=txns.filter(t=>!t.isRef).reduce((s,t)=>s+t.amount,0);
  const mv={};
  txns.filter(t=>!t.isRef&&!t.isDep).forEach(t=>mv[t.method]=(mv[t.method]||0)+(t.amount-(t.diAmt||0)));
  const methods=Object.entries(mv).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  const pays=txns.filter(t=>!t.isRef&&!t.isDep).map(t=>({...t,net:t.amount-(t.diAmt||0)}));
  const explicitRes=pays.find(t=>t.kind==='예약금');
  const explicitBal=pays.find(t=>t.kind==='잔금');
  const reservation=explicitRes||pays[0]||null;
  const balPays=pays.filter(t=>t!==reservation);
  const balance=explicitBal||balPays[0]||null;
  const balanceNetTotal=balPays.reduce((s,t)=>s+t.net,0);
  const balanceGrossTotal=balPays.reduce((s,t)=>s+t.amount,0);
  const balanceDiAmtTotal=balPays.reduce((s,t)=>s+(t.diAmt||0),0);
  return{txns,totalIn,dep,netIn:Math.max(0,totalIn-dep),methods:methods.length?methods:['기타'],memos,reservation,balance,balanceNetTotal,balanceGrossTotal,balanceDiAmtTotal,plannedReservation,plannedBalance,plannedDeposit};
}

function parseEv(ev,branch){
  const title=ev.summary||'';
  const date=(ev.start?.date||ev.start?.dateTime||'').slice(0,10);
  const rawStart=ev.start?.dateTime||ev.start?.date||'';
  const rawEnd=ev.end?.dateTime||ev.end?.date||'';
  let status='기타';
  if(/^\[취소\]/.test(title)||(/취소/.test(title)&&!/예약금/.test(title)))status='취소';
  else if(/완납/.test(title))status='완납';
  else if(/예약금/.test(title))status='예약금';
  const pd=parseDesc(ev.description,date.slice(0,4));
  const o=ov[ev.id]||{};
  const baseStatus=o.status||status;
  const payStatus=baseStatus==='취소'?'취소':(pd.balance||baseStatus==='완납')?'완납':pd.reservation?'예약금 입금':'미입금';
  const methods=o.methodsText!==undefined?o.methodsText.split(/[,+/ ]+/).map(s=>s.trim()).filter(Boolean):pd.methods;
  const _depFromTxn=pd.dep||(pd.plannedDeposit&&pd.balanceGrossTotal>0?pd.plannedDeposit:0);
  const dep=o.dep!==undefined?Number(o.dep)||0:_depFromTxn;
  const depText=o.depText!==undefined?o.depText:(dep?fa(dep):'');
  const totalIn=o.totalIn!==undefined?Number(o.totalIn):pd.totalIn;
  const hasActualBalance=!!pd.balance||pd.balanceGrossTotal>0;
  const balanceAmount=o.balanceAmount!==undefined?Number(o.balanceAmount):((payStatus==='취소'&&!hasActualBalance)?0:(pd.balanceGrossTotal||pd.plannedBalance||0));
  const _isCash=methods.includes('현금');
  const _balanceDateReal=o.balanceDate!==undefined&&o.balanceDate!==''&&o.balanceDate!=='입금 예정';
  const _actualReservation=o.reservationAmount!==undefined?Number(o.reservationAmount):(pd.reservation?.amount||0);
  const _actualBalance=o.balanceAmount!==undefined?Number(o.balanceAmount):(hasActualBalance?pd.balanceGrossTotal:(_balanceDateReal?pd.plannedBalance:0))||0;
  const _gross=_actualReservation+_actualBalance;
  const netIn=o.netIn!==undefined?Number(o.netIn):Math.max(0,_isCash?_gross-dep:_gross);
  const row={id:ev.id,date,branch,title,status:baseStatus,
    payStatus,totalIn,netIn,dep,depText,methods,txns:pd.txns,
    _actualReservation,_actualBalance,
    reservationDate:pd.reservation?.date||'',reservationAmount:pd.reservation?.amount||pd.plannedReservation||0,
    balanceDate:(payStatus==='취소'&&!hasActualBalance)?'':(pd.balance?.date||''),balanceAmount,balanceDiAmt:pd.balanceDiAmtTotal,reservationDiAmt:pd.reservation?.diAmt||0,
    notes:o.notes!==undefined?o.notes:pd.memos.slice(0,3).join(' / '),
    rawTitle:title,rawDesc:ev.description||'',rawStart,rawEnd,rawBranch:branch};
  return applyOverrides(row,o);
}

function isRel(ev){
  const t=ev.summary||'',d=ev.description||'';
  return/완납|예약금/.test(t)||/\d{4,8}[^\n]*원/.test(d);
}

function waitFor(name,check){
  return new Promise((resolve,reject)=>{
    const started=Date.now();
    const timer=setInterval(()=>{
      if(check()){clearInterval(timer);resolve()}
      else if(Date.now()-started>10000){clearInterval(timer);reject(new Error(`${name} 로딩 실패`))}
    },50);
  });
}

async function initGoogle(){
  if(googleReady)return googleReady;
  const clientId=getGoogleClientId();
  if(!clientId)throw new Error('Google OAuth 클라이언트 ID가 필요합니다.');
  googleReady=(async()=>{
    await waitFor('Google OAuth',()=>window.google?.accounts?.oauth2);
    await waitFor('Google API',()=>window.gapi?.load);
    await new Promise(resolve=>gapi.load('client',resolve));
    await gapi.client.init({discoveryDocs:[GOOGLE_DISCOVERY]});
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:GOOGLE_SCOPE,
      callback:()=>{}
    });
  })();
  return googleReady;
}

async function ensureGoogleToken(prompt=''){
  await initGoogle();
  if(gapi.client.getToken()?.access_token)return;
  await new Promise((resolve,reject)=>{
    tokenClient.callback=res=>{
      if(res.error)reject(new Error(res.error));
      else resolve();
    };
    tokenClient.requestAccessToken({prompt});
  });
}

async function fetchCoworkEvs(calId,year){
  const all=[];let tok=null;
  do{
    const p={calendarId:calId,startTime:`${year}-01-01T00:00:00`,endTime:`${year}-12-31T23:59:59`,pageSize:250,timeZone:'Asia/Seoul'};
    if(tok)p.pageToken=tok;
    const r=await window.cowork.callMcpTool(TOOL,p);
    if(r.isError)break;
    let d;try{d=r.structuredContent??JSON.parse(r.content[0].text)}catch(e){break}
    all.push(...(d.events||[]));tok=d.nextPageToken||null;
  }while(tok);
  return all;
}

async function fetchGoogleEvs(calId,year){
  await ensureGoogleToken('');
  // calendar 서비스가 로드될 때까지 잠시 대기 (최대 3초)
  for(let i=0; i<30; i++) {
    if(gapi.client.calendar) break;
    await new Promise(r=>setTimeout(r,100));
  }
  if(!gapi.client.calendar) throw new Error('Google Calendar API 서비스 로드 실패');
  
  const all=[];let pageToken=null;
  do{
    const r=await gapi.client.calendar.events.list({
      calendarId:calId,
      timeMin:`${year}-01-01T00:00:00+09:00`,
      timeMax:`${year}-12-31T23:59:59+09:00`,
      singleEvents:true,
      orderBy:'startTime',
      maxResults:2500,
      pageToken
    });
    all.push(...(r.result.items||[]));
    pageToken=r.result.nextPageToken||null;
  }while(pageToken);
  return all;
}

async function fetchEvs(calId,year){
  return hasCowork()?fetchCoworkEvs(calId,year):fetchGoogleEvs(calId,year);
}

async function loadAll(){
  customerAllData=null;
  remoteContactsReady=false;
  const btn=document.getElementById('rb');
  btn.disabled=true;btn.textContent='로딩 중...';selectedIds.clear();
  document.getElementById('tb').innerHTML='<tr><td colspan="12" class="gridmsg"><div class="spin"></div>캘린더 데이터 불러오는 중...</td></tr>';
  const year=document.getElementById('sy').value;
  const nextYear=String(parseInt(year)+1);
  try{
    await loadRemoteOv();
    if(!hasCowork()&&!getGoogleClientId())await loadRemoteGC();
    if(!hasCowork()&&!getGoogleClientId()){showGoogleSetup();return}
    allData=[];
    for(const cal of CALS){
      const evs=await fetchEvs(cal.id,year);
      evs.filter(isRel).forEach(ev=>allData.push(parseEv(ev,cal.name)));
      // 다음 연도 이벤트도 로드 — 선납 예약금이 현재 연도 실입금에 잡히도록
      const nextEvs=await fetchEvs(cal.id,nextYear);
      nextEvs.filter(isRel).forEach(ev=>allData.push(parseEv(ev,cal.name)));
    }
    addManualRowsToData();
    allData.sort((a,b)=>a.date.localeCompare(b.date));
    render();
  }catch(e){
    if(!hasCowork())showGoogleSetup(`오류: ${e.message}`);
    else document.getElementById('tb').innerHTML=`<tr><td colspan="12" class="gridmsg" style="color:#c00">오류: ${e.message}</td></tr>`;
  }finally{btn.disabled=false;btn.textContent='새로고침'}
}

    if(e.date.slice(0,4)!==yr)return false; // 메인 테이블은 선택 연도 이벤트만
    const hay=[e.date,e.branch,e.title,e.payStatus,e.reservationDate,e.balanceDate,e.netIn,e.dep,e.methods.join(' '),e.notes,e.rawTitle,e.rawDesc].join(' ').toLowerCase();
    return(!mo||e.date.slice(5,7)===mo)&&(!br||e.branch===br)&&(!st||e.payStatus===st)&&(!q||hay.includes(q));
  });
}
function getFilteredForChart(){

  const br=document.getElementById('sb').value,st=document.getElementById('ss').value;

  return allData.filter(e=>{

    const hay=[e.date,e.branch,e.title,e.payStatus,e.reservationDate,e.balanceDate,e.netIn,e.dep,e.methods.join(' '),e.notes,e.rawTitle,e.rawDesc].join(' ').toLowerCase();

function editCell(e,id,key,type='text'){
  e.stopPropagation();
  const host=e.currentTarget;
  const ev=evById(id);if(!ev)return;
  let cur=key==='methodsText'?ev.methods.join('+'):(ev[key]??'');
  if(!cur&&key==='balanceDate'&&Number(ev.balanceAmount)>0)cur='입금 예정';
  if(!cur&&key==='balanceDate2'&&Number(ev.balanceAmount2)>0)cur='입금 예정';
  let input;
  if(type==='select'){
    input=document.createElement('select');
    const opts=key==='branch'?['문래점','신논현점']:['완납','예약금 입금','취소','환불'];
    opts.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===cur)o.selected=true;input.appendChild(o)});
    input.className='editinp';
  }else if(type==='area'){
    input=document.createElement('textarea');
    input.value=cur;
    input.rows=1;
    input.className='editarea';
    host.closest('.note')?.classList.add('editing');
  }else{
    input=document.createElement('input');
    input.type='text';
    input.value=type==='money'?(Number(cur)||''):cur;
    input.className='editinp '+(type==='money'?'editnum':'');
  }
  host.classList.add('editingcell');
  host.innerHTML='';
  host.appendChild(input);
  input.focus();
  if(type==='area'){
    const baseHeight=input.getBoundingClientRect().height||32;
    const resizeArea=()=>{
      input.style.height=baseHeight+'px';
      if(input.scrollHeight>input.clientHeight){
        input.style.height=Math.min(input.scrollHeight,180)+'px';
      }
    };
    input.addEventListener('mousedown',ev=>ev.stopPropagation());
    input.addEventListener('click',ev=>ev.stopPropagation());
    input.addEventListener('input',resizeArea);
    input.setSelectionRange(input.value.length,input.value.length);
  }else{
    input.select?.();
  }
  let _saved=false;
  const done=()=>{
    if(_saved)return;
    _saved=true;
    const val=type==='money'?cleanNum(input.value):input.value.trim();
    setOv(id,key,val);
    render();
  };
  input.addEventListener('blur',done,{once:true});
  input.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'&&!(type==='area'&&ev.shiftKey)){ev.preventDefault();done();}
    if(ev.key==='Escape'){_saved=true;render();}
  });
}

function getNetBalance(ev){

function todayYmd(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return`${y}-${m}-${day}`;
}
function isCountablePayDate(date,year,allowFuture=false){
  if(!date||date==='입금 예정'||date==='미입금'||date.slice(0,4)!==year)return false;
  const mo=parseInt(date.slice(5,7),10);
  if(mo<1||mo>12)return false;
  return allowFuture||date<=todayYmd();
}
function paymentParts(ev,year){
  const sign=ev.payStatus==='환불'?-1:1;
  const _isCash=(ev.methods||[]).includes('현금');
  const parts=[];
  // 현금만 보증금 차감. 예약금 라인 inline 보증금 → 예약금에서, 잔금 라인 inline → 잔금에서, 별도 라인 → 잔금에서
  const resDep=_isCash?(Number(ev.reservationDiAmt)||0):0;
  const balDep=_isCash?(Number(ev.balanceDiAmt)||0):0;
  const remainDep=_isCash?Math.max(0,(Number(ev.dep)||0)-resDep-balDep):0;
  if(isCountablePayDate(ev.reservationDate,year,!!ev.manual)){
    const gross=Number(ev.reservationAmount)||0;
    const amount=sign*Math.max(0,gross-resDep);
    parts.push({date:ev.reservationDate,amount,gross,depositOffset:Math.max(0,gross)-Math.max(0,amount),dateKey:'reservationDate',amountKey:'reservationAmount',kind:'예약금'});
  }
  if(isCountablePayDate(ev.balanceDate,year,!!ev.manual)){
    const gross=Number(ev.balanceAmount)||0;
    const amount=sign*Math.max(0,gross-balDep-remainDep);
    parts.push({date:ev.balanceDate,amount,gross,depositOffset:Math.max(0,gross)-Math.max(0,amount),dateKey:'balanceDate',amountKey:'balanceAmount',kind:'잔금'});
  }
  if(isCountablePayDate(ev.balanceDate2,year,!!ev.manual)){
    const gross=Number(ev.balanceAmount2)||0;
    const amount=sign*Math.max(0,gross);
    parts.push({date:ev.balanceDate2,amount,gross,depositOffset:0,dateKey:'balanceDate2',amountKey:'balanceAmount2',kind:'잔금'});
  }
  return parts;
}
function periodNetIn(ev){
  const year=document.getElementById('sy').value;
  return paymentParts(ev,year).reduce((s,p)=>s+p.amount,0);
}
function effectiveNetIn(ev){
  // 카드/차트 합계용: 항상 입금날짜 기준 연도 필터 적용
  return periodNetIn(ev);
}
function payMonthIndex(date,year){
  if(!isCountablePayDate(date,year))return -1;
  return parseInt(date.slice(5,7),10)-1;
}

function editCashflowKind(e,id,kind,dateKey,date,amount){
  e.stopPropagation();
  const ev=evById(id);if(!ev)return;
  const opts=['예약금','잔금','청소보증금'];
  const sel=document.createElement('select');

  const host=e.currentTarget;
  host.classList.add('editingcell');host.innerHTML='';host.appendChild(sel);sel.focus();
  const apply=()=>{
    const newKind=sel.value;
    cleanup();
    if(newKind!==kind){
      if(newKind==='예약금'){
        if(kind==='잔금'){setOv(id,'balanceDate','');setOv(id,'balanceAmount',0);}
        else{setOv(id,'dep',0);setOv(id,'depText','');}
        setOv(id,'reservationDate',date);setOv(id,'reservationAmount',amount);
      }else if(newKind==='잔금'){
        if(kind==='예약금'){setOv(id,'reservationDate','');setOv(id,'reservationAmount',0);}
        else{setOv(id,'dep',0);setOv(id,'depText','');}
        setOv(id,'balanceDate',date);setOv(id,'balanceAmount',amount);
      }else if(newKind==='청소보증금'){
        if(kind==='예약금'){setOv(id,'reservationDate','');setOv(id,'reservationAmount',0);}
        else{setOv(id,'balanceDate','');setOv(id,'balanceAmount',0);}
        setOv(id,'dep',amount);setOv(id,'depText',String(amount));
      }
      saveOv();render();
    }
    renderChart();
  };
  const cleanup=()=>document.removeEventListener('mousedown',outside,true);
  const outside=(ev)=>{if(!host.contains(ev.target)){cleanup();renderChart();}};
  sel.onchange=apply;
  setTimeout(()=>document.addEventListener('mousedown',outside,true),0);

  let text=String(value??'');
  if(/^[=+\-@]/.test(text.trimStart()))text=`'${text}`;
  return`"${text.replace(/"/g,'""')}"`;
}
function csvMoney(n){return Number(n)||0}
function csvDateMoney(date,amount){
  const parts=[];
  if(date)parts.push(date);
  if(Number(amount))parts.push(fa(Number(amount)));
  return parts.join(' / ');
}
function downloadCsv(csv,name){
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function buildTableCsv(){
  const data=getFiltered();
  const H=['대관일','지점','행사명','수납상태','예약금 입금','잔금 입금','청소보증금','대관수익 (대관일 기준)','결제방법','메모'];
  const rows=data.map(e=>[
    csvCell(e.date),csvCell(e.branch),csvCell(e.title),csvCell(e.payStatus),
    csvCell(csvDateMoney(e.reservationDate,e.reservationAmount)),
    csvCell([csvDateMoney(e.balanceDate,e.balanceAmount),csvDateMoney(e.balanceDate2,e.balanceAmount2)].filter(Boolean).join(' / ')),
    csvCell(e.depText||e.dep||0),csvMoney(e.netIn),csvCell(e.methods.join('+')),csvCell(e.notes||'')
  ]);
  return '﻿'+[H.join(','),...rows.map(r=>r.join(','))].join('\n');
}

function cashflowByMonth(year){
  const byMo={};
  let grandTotal=0;
  getFilteredForChart().forEach(e=>{
    if(e.payStatus==='환불')return;
    paymentParts(e,year).forEach(p=>{
      const mo=parseInt(p.date.slice(5,7),10)-1;
      if(mo<0||mo>11)return;
      if(!byMo[mo])byMo[mo]=[];
      byMo[mo].push({...p,e,isRes:p.kind==='예약금'});
      grandTotal+=p.amount;
    });
  });
  Object.keys(byMo).forEach(mo=>{
    byMo[mo].sort((a,b)=>a.date.localeCompare(b.date)||normalizeBranch(a.e.branch).localeCompare(normalizeBranch(b.e.branch),'ko')||a.e.title.localeCompare(b.e.title,'ko'));
  });
  return{byMo,grandTotal};
}

function buildCashflowCsv(){
  const year=document.getElementById('sy').value;
  const LABELS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const {byMo,grandTotal}=cashflowByMonth(year);
  const lines=[];
  lines.push([csvCell('월별 전체'),'',csvCell(year),csvMoney(grandTotal)].join(','));
  lines.push(['월','총액','건수'].join(','));
  for(let mo=0;mo<12;mo++){
    const items=byMo[mo]||[];
    lines.push([csvCell(LABELS[mo]),csvMoney(items.reduce((s,p)=>s+p.amount,0)),items.length].join(','));
  }
  lines.push('');
  for(let mo=0;mo<12;mo++){
    const items=byMo[mo]||[];
    lines.push([csvCell(`${LABELS[mo]} 상세`),csvCell(items.length?`${items.length}건`:'입금 없음'),csvMoney(items.reduce((s,p)=>s+p.amount,0))].join(','));
    lines.push(['입금날짜','행사명','대관일','구분','금액','결제방법','지점'].join(','));
    items.forEach(p=>{
      lines.push([
        csvCell(p.date),
        csvCell(p.e.title),
        csvCell(p.e.date),
        csvCell(p.kind),
        csvMoney(p.amount),
        csvCell(p.e.methods.join('+')||'기타'),
        csvCell(normalizeBranch(p.e.branch))
      ].join(','));
    });
    lines.push('');
  }
  return '﻿'+lines.join('\n');
}

function parsePhone(raw){
  const m=(raw||'').match(/01[0-9]-?\d{3,4}-?\d{4}/);
  return m?m[0].replace(/-/g,''):'';
}
const NAME_BLACKLIST_WORDS=['개인계좌','법인계좌','세금계산서','계산서','법인','개인','현금','카드','신신페이','기타','입금','추가입금'];
const NAME_TRAILING=/\s*(예약금|잔금|완납|환불|취소|입금|추가입금)\s*$/;
function nameFromTxns(txns){
  for(const t of(txns||[])){
    let n=t.name?.trim();
    if(!n)continue;
    if(NAME_BLACKLIST_WORDS.some(w=>n===w||n.startsWith(w+' ')||n.startsWith(w+'계')))continue;
    n=n.replace(NAME_TRAILING,'').trim();
    if(!n||NAME_BLACKLIST_WORDS.some(w=>n===w))continue;
    return n;
  }
  return'';
}
function nameFromTitle(title){
  return(title||'')
    .replace(/^\[.*?\]\s*/,'')
    .replace(/\[.*?\]\s*$/,'')
    .replace(/^\d+층\s*/,'')
    .replace(/[\[(][^)\]]*\/[^)\]]*[\])]$/,'')
    .replace(/\([^)]*\)$/,'')
    .trim();
}
async function loadRemoteContacts(){

    body:JSON.stringify({key:CONTACTS_KEY,value:contacts})
  }).catch(e=>console.warn('연락처 저장 실패',e));
}
function buildCustomerMap(data){
  const map={};
  data.forEach(ev=>{
    const phone=parsePhone(ev.rawDesc);
    if(!phone)return;
    if(!map[phone]){
      const autoName=nameFromTxns(ev.txns)||nameFromTitle(ev.rawTitle);
      map[phone]={phone,autoName,visits:[]};
    }
    if(!map[phone].autoName)map[phone].autoName=nameFromTxns(ev.txns)||nameFromTitle(ev.rawTitle);
    map[phone].visits.push(ev);
  });
  return map;
}
async function loadCustomerData(){
  if(customerAllData)return customerAllData;
  const years=['2025','2026','2027'];
  const seen=new Set();
  const all=[];
  for(const yr of years){
    for(const cal of CALS){
      try{
        const evs=await fetchEvs(cal.id,yr);
        evs.filter(isRel).forEach(ev=>{
          if(seen.has(ev.id))return;
          seen.add(ev.id);
          all.push(parseEv(ev,cal.name));
        });
      }catch(e){}
    }
  }
  customerAllData=all;
  return all;
}

function filterCustomers(q){
  const lq=(q||'').toLowerCase().trim();
  let shown=0,total=0;
  document.querySelectorAll('#cust-content .cust-row').forEach(row=>{
    total++;
    const visible=!lq||(row.dataset.search||'').includes(lq);
    row.classList.toggle('filtered-out',!visible);
    const phone=row.id.replace('cust-row-','');
    const det=document.getElementById(`cp_${phone}`);
    if(det)det.classList.toggle('filtered-out',!visible);
    if(visible)shown++;
  });
  const kpiEl=document.getElementById('cust-kpi');
  if(kpiEl&&lq){const first=kpiEl.querySelector('.cust-kpi-val');if(first)first.innerHTML=`${shown}<span style="font-size:14px;font-weight:600;color:var(--muted)">/${total}명</span>`;}
}

function startCustFieldEdit(phone,field,curVal,e){
  e.stopPropagation();
  const span=document.getElementById(`cust-f-${field}-${phone}`);
  if(!span||span.querySelector('input'))return;
  const cur=contacts[phone]?.[field]??curVal;
  const inp=document.createElement('input');
  inp.className='cust-inline-inp';
  inp.value=cur==='회'?cur.replace('회',''):cur;
  inp.style.cssText='width:100%;text-align:inherit';
  span.innerHTML='';
  span.appendChild(inp);
  inp.focus();inp.select();
  const commit=()=>{
    const val=inp.value.trim();
    if(val===''||val===curVal){
      // 변경없으면 원래대로
      renderCustFieldSpan(phone,field,curVal);
      return;
    }
    pushContactsHistory();
    if(!contacts[phone])contacts[phone]={};
    contacts[phone][field]=val;
    saveRemoteContacts();
    renderCustFieldSpan(phone,field,val);
  };
  inp.onblur=commit;
  inp.onkeydown=ev=>{
    if(ev.key==='Enter'){ev.preventDefault();inp.blur();}
    if(ev.key==='Escape'){renderCustFieldSpan(phone,field,curVal);inp.onblur=null;}
  };
}

  else if(field==='totalRevenue'){span.textContent=fa(Number(String(val).replace(/[^0-9]/g,''))||0);refreshCustKPI();}
  else span.textContent=val;

    if(key==='name'){
      const nameEl=document.getElementById(`cust-name-txt-${phone}`);
      if(nameEl&&!nameEl.querySelector('input'))nameEl.textContent=val.trim()||'이름 없음';
      const searchData=(row.dataset.search||'').replace(/^[^ ]*/,val.trim().toLowerCase());
      row.dataset.search=searchData;
    }else if(key==='memo'){
      const memoEl=document.getElementById(`cust-memo-cell-${phone}`);
      if(memoEl&&!memoEl.querySelector('input'))memoEl.innerHTML=val.trim()?esc(val.trim()):'<span style="color:#d1d5db">-</span>';
    }
  }
}

function switchView(v){
  currentView=v;
  if(v!=='table')document.getElementById('sm').value='';
  document.getElementById('view-table').style.display=v==='table'?'block':'none';
  document.getElementById('view-chart').style.display=v==='chart'?'block':'none';
  document.getElementById('view-customer').style.display=v==='customer'?'block':'none';
  document.getElementById('toolbar-controls').style.display=v==='customer'?'none':'contents';
  document.getElementById('cust-toolbar-inner').style.display=v==='customer'?'contents':'none';
  document.querySelectorAll('.table-only-filter').forEach(el=>{el.style.display=v==='table'?'':'none';});
  document.getElementById('tab-table').classList.toggle('active',v==='table');
  document.getElementById('tab-chart').classList.toggle('active',v==='chart');
  document.getElementById('tab-customer').classList.toggle('active',v==='customer');
  if(v==='chart')renderChart();
  if(v==='customer')renderCustomers();
  updateUndoBtn();
}

function renderChart(){
  const year=document.getElementById('sy').value;
  const LABELS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const chartRows=getFilteredForChart();

  // ── 듀얼 데이터 집계 ──────────────────────────────
  // A: 대관수익 (대관월 기준, periodNetIn)
  // B: 실입금   (입금날짜 기준, paymentParts)
  const evByMo=Array(12).fill(0);
  const payByMo=Array(12).fill(0);
  const brMap={}; // {branch:{ev,pay,outstanding}}
  const brPayByMo={}; // {branch: Array(12)}

  chartRows.forEach(e=>{
    const b=normalizeBranch(e.branch);
    if(!brMap[b])brMap[b]={ev:0,pay:0,out:0};
    if(!brPayByMo[b])brPayByMo[b]=Array(12).fill(0);
    if(e.payStatus==='환불')return;

    const evMo=parseInt(e.date.slice(5,7),10)-1;
    const net=Number(e.netIn)||0;
    brMap[b].ev+=net;
    const todayMo=new Date().getMonth();
    if(evMo>=0&&evMo<=todayMo)evByMo[evMo]+=net;

    paymentParts(e,year).forEach(p=>{
      const pMo=parseInt(p.date.slice(5,7),10)-1;
      if(pMo>=0&&pMo<12){payByMo[pMo]+=p.amount;brMap[b].pay+=p.amount;brPayByMo[b][pMo]+=p.amount;}
    });

    if(e.payStatus==='예약금 입금'&&e.date.slice(0,4)===year)brMap[b].out+=Number(e.balanceAmount)||0;
  });

  const totalPay=payByMo.reduce((s,v)=>s+v,0);
  const totalOut=Object.values(brMap).reduce((s,v)=>s+v.out,0);
  // 취소/환불 ev.netIn 기준 집계 (테이블 카드와 동일 기준)
  const cancelMap={},refundMap={};
  chartRows.forEach(e=>{
    const b=normalizeBranch(e.branch);
    const v=Number(e.netIn)||0;
    if(e.payStatus==='취소'){if(!cancelMap[b])cancelMap[b]=0;cancelMap[b]+=v;}
    if(e.payStatus==='환불'){if(!refundMap[b])refundMap[b]=0;refundMap[b]+=v;}
  });
  const totalCancelAmt=Object.values(cancelMap).reduce((s,v)=>s+v,0);
  const totalRefundAmt=Object.values(refundMap).reduce((s,v)=>s+v,0);

  // ── KPI 카드 ──────────────────────────────────────
  const brEntries=Object.entries(brMap).sort((a,b)=>b[1].pay-a[1].pay);
  const brColor=n=>normalizeBranch(n)==='문래점'?'#2563eb':'#7c3aed';
  const brRowsHtml=(key)=>brEntries.map(([n,v])=>
    `<div class="ak-br-row"><span class="ak-br-name" style="color:${brColor(n)}">${n}</span><span class="ak-br-val">${fa(v[key])}</span></div>`
  ).join('');
  const brMapRows=(map)=>Object.entries(map).length
    ?Object.entries(map).map(([n,v])=>`<div class="ak-br-row"><span class="ak-br-name" style="color:${brColor(n)}">${n}</span><span class="ak-br-val">${fa(v)}</span></div>`).join('')
    :'<div style="font-size:12px;color:#b0b8c4">없음</div>';

  document.getElementById('an-kpi').innerHTML=`
    <div class="an-kpi-card">
      <div class="ak-lbl">연간 실입금</div>
      <div class="ak-val green">${fa(totalPay)}</div>
      <div class="ak-sub">${year}년 실제 수령액 (입금날짜 기준)</div>
      <hr class="ak-divider">
      <div class="ak-branches">${brRowsHtml('pay')}</div>
    </div>
    <div class="an-kpi-card">
      <div class="ak-lbl">잔금 미수금</div>
      <div class="ak-val amber">${fa(totalOut)}</div>
      <div class="ak-sub">예약금 입금 건 잔여 잔금</div>
      <hr class="ak-divider">
      <div class="ak-branches">${brEntries.map(([n,v])=>
        `<div class="ak-br-row"><span class="ak-br-name" style="color:${brColor(n)}">${n}</span><span class="ak-br-val">${fa(v.out)}</span></div>`
      ).join('')}</div>
    </div>
    <div class="an-kpi-card" style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">
      <div>
        <div class="ak-lbl">취소 수익</div>
        <div class="ak-val" style="color:#d97706;font-size:20px">${fa(totalCancelAmt)}</div>
        <div class="ak-sub">받고 안 돌려준 금액</div>
        <hr class="ak-divider" style="margin:8px 0">
        <div class="ak-branches">${brMapRows(cancelMap)}</div>
      </div>
      <div>
        <div class="ak-lbl">환불</div>
        <div class="ak-val red" style="font-size:20px">-${fa(totalRefundAmt)}</div>
        <div class="ak-sub">돌려준 금액</div>
        <hr class="ak-divider" style="margin:8px 0">
        <div class="ak-branches">${brMapRows(refundMap)}</div>
      </div>
    </div>`;

  // ── 차트 ─────────────────────────────────────────
  document.getElementById('an-chart-title').textContent=`${year}년 월별 실입금`;
  const ctx=document.getElementById('revenueChart').getContext('2d');
  if(revenueChartInst)revenueChartInst.destroy();
  const selectedBr=document.getElementById('sb').value;
  const brChartColors={'문래점':['#2563eb55','#2563eb'],'신논현점':['#7c3aed55','#7c3aed']};
  const chartDatasets=selectedBr
    ?[{label:`실입금 (${selectedBr})`,data:payByMo,backgroundColor:'#05966999',borderColor:'#059669',borderWidth:1.5,borderRadius:5}]
    :Object.entries(brPayByMo).map(([br,data])=>{
        const [bg,border]=brChartColors[br]||['#05966999','#059669'];
        return{label:br,data,backgroundColor:bg,borderColor:border,borderWidth:1.5,borderRadius:5};
      });
  revenueChartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:LABELS,
      datasets:chartDatasets
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{font:{size:13,weight:'bold'},padding:16}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fa(c.parsed.y)}`}},
        annotation:{annotations:{rentLine:{type:'line',yMin:7000000,yMax:7000000,borderColor:'#ef4444',borderWidth:1.5,borderDash:[6,4],label:{display:true,content:'월세 700만',position:'end',xAdjust:-8,backgroundColor:'transparent',color:'#ef4444',font:{size:11,weight:'bold'}}}}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:12}}},
        y:{ticks:{callback:v=>v>=10000?(v/10000)+'만':''+v,font:{size:11}},grid:{color:'#f0f0f0'}}
      }
    }
  });

  // ── 실입금 테이블 ─────────────────────────────────
  const {byMo,grandTotal}=cashflowByMonth(year);
  document.getElementById('an-cf-total').textContent=fa(grandTotal);

  let html=`<table class="cf-table">
    <thead class="cf-thead"><tr>
      <th>입금날짜</th><th>행사명</th><th>대관일</th>
      <th style="text-align:center">구분</th><th class="r">금액</th>
      <th style="text-align:center">결제방법</th><th class="r">지점</th><th></th>
    </tr></thead>`;

  const BR_ORDER=['문래점','신논현점'];
  const BR_COLOR={'문래점':'#2563eb','신논현점':'#7c3aed'};
  for(let mo=0;mo<12;mo++){
    const all=(byMo[mo]||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
    const moTotal=all.reduce((s,p)=>s+p.amount,0);
    const bid=`cfb${mo}`;
    html+=`<tbody><tr class="cf-mrow ${open.has(bid)?'open':''}" onclick="toggleCfMo('${bid}',this)">
      <td colspan="8">${LABELS[mo]}${all.length
        ?`<span class="cf-mtotal">${fa(moTotal)}</span><span class="cf-mcnt">${all.length}건</span>`
        :'<span class="cf-mempty">입금 없음</span>'}
        <button class="cf-add" onclick="addCashflowRow(${mo},event)" title="행 추가">🖊️</button>
        <span class="cf-arrow">▼</span>
      </td></tr></tbody>
    <tbody class="cf-body ${open.has(bid)?'open':''}" id="${bid}">`;
    // 지점별 그룹
    const byBr={};
    all.forEach(p=>{const b=normalizeBranch(p.e.branch);if(!byBr[b])byBr[b]=[];byBr[b].push(p);});
    const brs=[...BR_ORDER.filter(b=>byBr[b]),...Object.keys(byBr).filter(b=>!BR_ORDER.includes(b))];
    const multiBr=brs.length>1;
    brs.forEach(br=>{
      const bItems=byBr[br];
      const bColor=BR_COLOR[br]||'#374151';
      const bTotal=bItems.reduce((s,p)=>s+p.amount,0);
      if(multiBr)html+=`<tr class="cf-br-hdr"><td colspan="8"><span style="color:${bColor};font-weight:800;font-size:12px">${br}</span><span class="cf-mtotal">${fa(bTotal)}</span><span class="cf-mcnt">${bItems.length}건</span></td></tr>`;
      bItems.forEach(p=>{
        const bc=bColor;
        const methodText=p.e.methods.join('+')||'기타';
        html+=`<tr class="cf-row" data-cf-id="${p.e.id}">
          <td class="cf-td-date">${cell(p.e.id,p.dateKey,p.date,'date')}</td>
          <td class="cf-td-title"><div class="titlecell"><span>${cell(p.e.id,'title',p.e.title,'text')}</span><button class="rawbtn" onclick="openRaw('${p.e.id}',event)">원문</button></div></td>
          <td class="cf-td-evdate">${cell(p.e.id,'date',p.e.date,'date')}</td>
          <td class="cf-td-lbl"><span class="cf-ilbl ${p.isRes?'res':'bal'}"${p.e.manual?'':` onclick="editCashflowKind(event,'${p.e.id}','${p.kind}','${p.dateKey}','${p.date}',${p.amount})"`}>${p.isRes?'예약금':'잔금'}</span></td>
          <td class="cf-td-amt"><span class="editcell amt" data-val="${p.amount}" onclick="editCashflowAmount(event,'${p.e.id}','${p.amountKey}',${Number(p.depositOffset)||0})">${fa(p.amount)}</span></td>
          <td class="cf-td-method">${cell(p.e.id,'methodsText',methodText,'text')}</td>
          <td class="cf-td-br" style="color:${bc}">${cell(p.e.id,'branch',p.e.branch,'select')}</td>
          <td class="cf-td-action">${p.e.manual?`<button class="delbtn" onclick="deleteManualRow('${p.e.id}',event)">삭제</button>`:`<button class="delbtn" onclick="hideRow('${p.e.id}',event)" title="숨기기">숨김</button>`}</td>
        </tr>`;
      });
    });
    html+=`</tbody>`;
  }
  html+=`</table>`;
  document.getElementById('cashflow-content').innerHTML=html;
  updateClearManualBtn();
}

function toggleCfMo(id,hdr){
  const el=document.getElementById(id);if(!el)return;
  const isOpen=el.classList.toggle('open');
  hdr.classList.toggle('open',isOpen);
  if(isOpen)open.add(id);
  else open.delete(id);
}


if(sessionStorage.getItem(ACCESS_KEY)==='1')showApp();
</script>
