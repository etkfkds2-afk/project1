<script>
const ACCESS_HASH='9af15b336e6a9619928537df30b2e6a2376569fcf9d7e773eccede65606529a0';
const ACCESS_KEY='atm_payment_access_ok';
const GOOGLE_CLIENT_KEY='atm_google_client_id_v2';
const GOOGLE_DEFAULT_CLIENT_ID='';
const GOOGLE_SCOPE='https://www.googleapis.com/auth/calendar.readonly';
const GOOGLE_DISCOVERY='https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
const CALS=[
  {id:'atmind0361@gmail.com',name:'문래점'},
  {id:'1824a066dc6b3d4d7f89ae11beaf22d7f24c78856a04552a3a03ce3200b7fbd2@group.calendar.google.com',name:'신논현점'}
];
const TOOL='mcp__7562d3df-f0a0-4481-87e0-f6c4660717b3__list_events';
let allData=[], ov={};
let refreshTimer=null;
let showHidden=false;
let googleReady=null, tokenClient=null;
const open=new Set();
try{ov=JSON.parse(localStorage.getItem('atm_ov')||'{}')}catch(e){}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function saveOv(){try{localStorage.setItem('atm_ov',JSON.stringify(ov))}catch(e){}}
function cleanNum(v){return pa(String(v||'').replace(/[^\d,]/g,''))}
function normStatus(v){return v==='예약금'?'예약금 입금':v}
function setOv(id,key,val){
  if(!ov[id])ov[id]={};
  ov[id][key]=val;
  saveOv();
  const ev=allData.find(e=>e.id===id);
  if(ev){
    if(key==='methodsText')ev.methods=String(val||'').split(/[,+/ ]+/).map(s=>s.trim()).filter(Boolean);
  else ev[key]=key==='payStatus'?normStatus(val):val;
  }
}
function applyOverrides(row,o){
  ['date','branch','title','payStatus','reservationDate','balanceDate','notes'].forEach(k=>{
    if(o[k]!==undefined)row[k]=k==='payStatus'?normStatus(o[k]):o[k];
  });
  ['reservationAmount','balanceAmount','netIn','dep'].forEach(k=>{
    if(o[k]!==undefined)row[k]=Number(o[k])||0;
  });
  if(o.methodsText!==undefined)row.methods=String(o.methodsText).split(/[,+/ ]+/).map(s=>s.trim()).filter(Boolean);
  if(o.hidden!==undefined)row.hidden=!!o.hidden;
  return row;
}

async function sha256(text){
  const data=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest('SHA-256',data);
  return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showApp(){
  document.body.classList.remove('locked');
  document.getElementById('authScreen').style.display='none';
  loadAll();
}

async function unlockApp(e){
  e.preventDefault();
  const input=document.getElementById('accessPass');
  const err=document.getElementById('authErr');
  err.textContent='';
  if(await sha256(input.value)===ACCESS_HASH){
    sessionStorage.setItem(ACCESS_KEY,'1');
    showApp();
  }else{
    err.textContent='비밀번호가 맞지 않습니다.';
    input.value='';
    input.focus();
  }
}

function sh(s){
  return(s||'')
    .replace(/<br\s*\/?>/gi,'\n').replace(/<p[^>]*>/gi,'\n').replace(/<\/p>/gi,'')
    .replace(/<[biu][^>]*>(.*?)<\/[biu]>/gi,'$1').replace(/<[^>]+>/g,' ')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}
function pa(s){return parseInt((s||'').replace(/,/g,''))||0}
function fa(n){return n?n.toLocaleString('ko-KR')+'원':'-'}
function gm(l){
  if(/신신페이|카드결제|카드\s*결제|국민카드|삼성카드|현대카드|전화승인/.test(l))return'카드';
  if(/법인계좌|법인|세금계산서|계산서/.test(l))return'세금계산서';
  if(/개인계좌|개인|현금/.test(l))return'현금';
  return'기타';
}
function pk(line){
  if(/예약금/.test(line))return'예약금';
  if(/잔금|완납|나머지|차액/.test(line))return'잔금';
  return'';
}

function parseDesc(raw){
  const text=sh(raw||'');
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const txns=[];let dep=0;const memos=[];let pendingDep=0;
  for(const line of lines){
    const dm=line.match(/^(\d{6,8})\s*/);
    if(dm){
      const ds=dm[1];
      let date=ds;
      if(ds.length===8)date=`${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6)}`;
      else if(ds.length===7)date=`${ds.slice(0,4)}-0${ds.slice(4,5)}-${ds.slice(5)}`;
      else if(ds.length===6)date=`${ds.slice(0,4)}-${ds.slice(4)}`;
      const method=gm(line);
      const kind=pk(line);
      const isRef=/→\s*환불|환불완료|환불해줘야|환급/.test(line);
      // Inline deposit: (청소보증금 N원 포함)
      const di=(line.match(/[（(]청소보증금\s*([0-9,]+)원\s*포함[）)]/)||
                line.match(/청소보증금\s*([0-9,]+)원\s*포함/)||
                line.match(/보증금\s*([0-9,]+)원\s*포함/))?.[1];
      const diAmt=di?pa(di):pendingDep;pendingDep=0;
      // Strip deposit annotation before scanning amounts to avoid double-counting
      const lineForAmts=di?line.replace(/[（(]청소보증금\s*[0-9,]+원\s*포함[）)]/,'').replace(/청소보증금\s*[0-9,]+원\s*포함/,'').replace(/보증금\s*[0-9,]+원\s*포함/,''):line;
      const amts=[...lineForAmts.matchAll(/([0-9,]+)원/g)];
      if(!amts.length)continue;
      // Standalone deposit line
      const isl=/[（(]보증금[）)]/.test(line)||(/청소보증금/.test(line)&&!diAmt&&amts.length===1);
      const name=line.slice(dm[0].length).match(/^([가-힣A-Za-z()_\s\w]+?)(?:\s+(?:개인|법인|신신|카드|국민|\d))/)?.[1]?.trim()||'';
      let prevEnd=dm[0].length;
      const mixedCorpCash=/법인계좌|법인|세금계산서|계산서/.test(line)&&/개인계좌|개인|현금/.test(line)&&amts.length>1;
      amts.forEach((m,i)=>{
        const amt=pa(m[1]);if(!amt)return;
        const seg=lineForAmts.slice(prevEnd,m.index+m[0].length);
        const localMethod=gm(seg)==='기타'?method:gm(seg);
        const personalDeposit=mixedCorpCash&&localMethod==='현금';
        txns.push({date,name,method:localMethod,kind,amount:amt,isRef,isDep:(i===0&&isl)||personalDeposit,diAmt:i===0?diAmt:0});
        prevEnd=m.index+m[0].length;
      });
      if(isl&&amts[0])dep+=pa(amts[0][1]);
      else if(diAmt)dep+=diAmt;
      else if(mixedCorpCash)dep+=txns.filter(t=>t.date===date&&t.isDep&&t.method==='현금').reduce((s,t)=>s+t.amount,0);
      continue;
    }
    const depMatch=(line.match(/[（(]청소보증금\s*([0-9,]+)원\s*포함[）)]/)||line.match(/청소보증금\s*([0-9,]+)원\s*포함/)||line.match(/보증금\s*([0-9,]+)원\s*포함/))?.[1];
    if(depMatch)pendingDep=pa(depMatch);
    if(/청소보증금/.test(line)&&/안받았음|생략|면제/.test(line))memos.push('청소보증금 미수취');
    if(/^\*|취소|환불|환급|할인|이슈|재결제/.test(line)){
      const m=line.replace(/^\*+/,'').trim();
      if(m&&m.length<100)memos.push(m);
    }
  }
  const totalIn=txns.filter(t=>!t.isRef).reduce((s,t)=>s+t.amount,0);
  const mv={};
  txns.filter(t=>!t.isRef&&!t.isDep).forEach(t=>mv[t.method]=(mv[t.method]||0)+(t.amount-(t.diAmt||0)));
  const methods=Object.entries(mv).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  const pays=txns.filter(t=>!t.isRef&&!t.isDep).map(t=>({...t,net:t.amount-(t.diAmt||0)}));
  const explicitRes=pays.find(t=>t.kind==='예약금');
  const explicitBal=pays.find(t=>t.kind==='잔금');
  const reservation=explicitRes||pays[0]||null;
  const balance=explicitBal||pays.find(t=>reservation&&t!==reservation)||null;
  return{txns,totalIn,dep,netIn:Math.max(0,totalIn-dep),methods:methods.length?methods:['기타'],memos,reservation,balance};
}

function parseEv(ev,branch){
  const title=ev.summary||'';
  const date=(ev.start?.date||ev.start?.dateTime||'').slice(0,10);
  const rawStart=ev.start?.dateTime||ev.start?.date||'';
  const rawEnd=ev.end?.dateTime||ev.end?.date||'';
  let status='기타';
  if(/^\[취소\]/.test(title)||(/취소/.test(title)&&!/예약금/.test(title)))status='취소';
  else if(/완납/.test(title))status='완납';
  else if(/예약금/.test(title))status='예약금';
  const pd=parseDesc(ev.description);
  const o=ov[ev.id]||{};
  const baseStatus=o.status||status;
  const payStatus=baseStatus==='취소'?'취소':(pd.balance||baseStatus==='완납')?'완납':pd.reservation?'예약금 입금':'미입금';
  const row={id:ev.id,date,branch,title,status:baseStatus,
    payStatus,totalIn:pd.totalIn,netIn:pd.netIn,dep:pd.dep,methods:pd.methods,txns:pd.txns,
    reservationDate:pd.reservation?.date||'',reservationAmount:pd.reservation?.net||0,
    balanceDate:pd.balance?.date||'',balanceAmount:pd.balance?.net||0,
    notes:o.notes!==undefined?o.notes:pd.memos.slice(0,3).join(' / '),
    rawTitle:title,rawDesc:ev.description||'',rawStart,rawEnd,rawBranch:branch};
  return applyOverrides(row,o);
}

function isRel(ev){
  const t=ev.summary||'',d=ev.description||'';
  return/완납|예약금/.test(t)||/\d{7,8}[^\n]*원/.test(d);
}

function hasCowork(){return !!window.cowork?.callMcpTool}
function getGoogleClientId(){return localStorage.getItem(GOOGLE_CLIENT_KEY)||GOOGLE_DEFAULT_CLIENT_ID}

function waitFor(name,check){
  return new Promise((resolve,reject)=>{
    const started=Date.now();
    const timer=setInterval(()=>{
      if(check()){clearInterval(timer);resolve()}
      else if(Date.now()-started>10000){clearInterval(timer);reject(new Error(`${name} 로딩 실패`))}
    },50);
  });
}

async function initGoogle(){
  if(googleReady)return googleReady;
  const clientId=getGoogleClientId();
  if(!clientId)throw new Error('Google OAuth 클라이언트 ID가 필요합니다.');
  googleReady=(async()=>{
    await waitFor('Google OAuth',()=>window.google?.accounts?.oauth2);
    await waitFor('Google API',()=>window.gapi?.load);
    await new Promise(resolve=>gapi.load('client',resolve));
    await gapi.client.init({discoveryDocs:[GOOGLE_DISCOVERY]});
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:GOOGLE_SCOPE,
      callback:()=>{}
    });
  })();
  return googleReady;
}

async function ensureGoogleToken(prompt=''){
  await initGoogle();
  if(gapi.client.getToken()?.access_token)return;
  await new Promise((resolve,reject)=>{
    tokenClient.callback=res=>{
      if(res.error)reject(new Error(res.error));
      else resolve();
    };
    tokenClient.requestAccessToken({prompt});
  });
}

function showGoogleSetup(msg=''){
  const origin=location.origin;
  document.getElementById('tb').innerHTML=`<div class="gridmsg">
    <div class="setup">
      <h2>Google Calendar 연결</h2>
      <p>${msg||'방금 새로 만든 OAuth 2.0 웹 클라이언트 ID를 입력하세요.'}</p>
      <p class="muted">Google Cloud 승인된 JavaScript 원본에는 아래 주소가 정확히 들어가 있어야 합니다.</p>
      <input value="${origin.replace(/"/g,'&quot;')}" readonly onclick="this.select()">
      <input id="googleClientId" value="${getGoogleClientId().replace(/"/g,'&quot;')}" placeholder="새 OAuth 2.0 Client ID">
      <div class="row">
        <button onclick="saveGoogleClient(event)">저장 후 로그인</button>
        <button onclick="clearGoogleClient(event)" style="background:#777">초기화</button>
      </div>
      <p class="muted">클라이언트 ID는 ...apps.googleusercontent.com 으로 끝납니다. 클라이언트 비밀번호는 넣지 않습니다.</p>
    </div>
  </div>`;
}

async function saveGoogleClient(e){
  e.stopPropagation();
  const v=document.getElementById('googleClientId').value.trim();
  if(!v){showGoogleSetup('클라이언트 ID를 입력하세요.');return}
  localStorage.setItem(GOOGLE_CLIENT_KEY,v);
  googleReady=null;tokenClient=null;
  await connectGoogle();
}

function clearGoogleClient(e){
  e.stopPropagation();
  localStorage.removeItem(GOOGLE_CLIENT_KEY);
  googleReady=null;tokenClient=null;
  if(window.gapi?.client)gapi.client.setToken(null);
  showGoogleSetup('저장된 클라이언트 ID를 지웠습니다.');
}

async function connectGoogle(){
  try{
    await ensureGoogleToken('consent');
    await loadAll();
  }catch(e){
    showGoogleSetup(`Google 로그인 실패: ${e.message}`);
  }
}

async function fetchCoworkEvs(calId,year){
  const all=[];let tok=null;
  do{
    const p={calendarId:calId,startTime:`${year}-01-01T00:00:00`,endTime:`${year}-12-31T23:59:59`,pageSize:250,timeZone:'Asia/Seoul'};
    if(tok)p.pageToken=tok;
    const r=await window.cowork.callMcpTool(TOOL,p);
    if(r.isError)break;
    let d;try{d=r.structuredContent??JSON.parse(r.content[0].text)}catch(e){break}
    all.push(...(d.events||[]));tok=d.nextPageToken||null;
  }while(tok);
  return all;
}

async function fetchGoogleEvs(calId,year){
  await ensureGoogleToken('');
  const all=[];let pageToken=null;
  do{
    const r=await gapi.client.calendar.events.list({
      calendarId:calId,
      timeMin:`${year}-01-01T00:00:00+09:00`,
      timeMax:`${year}-12-31T23:59:59+09:00`,
      singleEvents:true,
      orderBy:'startTime',
      maxResults:2500,
      pageToken
    });
    all.push(...(r.result.items||[]));
    pageToken=r.result.nextPageToken||null;
  }while(pageToken);
  return all;
}

async function fetchEvs(calId,year){
  return hasCowork()?fetchCoworkEvs(calId,year):fetchGoogleEvs(calId,year);
}

async function loadAll(){
  const btn=document.getElementById('rb');
  btn.disabled=true;btn.textContent='⏳ 로딩 중...';
  document.getElementById('tb').innerHTML='<div class="gridmsg"><div class="spin"></div>캘린더 데이터 불러오는 중...</div>';
  const year=document.getElementById('sy').value;
  try{
    if(!hasCowork()&&!getGoogleClientId()){showGoogleSetup();return}
    allData=[];
    for(const cal of CALS){
      const evs=await fetchEvs(cal.id,year);
      evs.filter(isRel).forEach(ev=>allData.push(parseEv(ev,cal.name)));
    }
    allData.sort((a,b)=>a.date.localeCompare(b.date));
    render();
  }catch(e){
    if(!hasCowork())showGoogleSetup(`오류: ${e.message}`);
    else document.getElementById('tb').innerHTML=`<div class="gridmsg" style="color:#c00">오류: ${e.message}</div>`;
  }finally{btn.disabled=false;btn.textContent='🔄 새로고침'}
}

function getFiltered(){
  const mo=document.getElementById('sm').value,br=document.getElementById('sb').value,st=document.getElementById('ss').value;
  const q=(document.getElementById('sq')?.value||'').trim().toLowerCase();
  return allData.filter(e=>{
    if(!showHidden&&e.hidden)return false;
    const hay=[e.date,e.branch,e.title,e.payStatus,e.reservationDate,e.balanceDate,e.netIn,e.dep,e.methods.join(' '),e.notes,e.rawTitle,e.rawDesc].join(' ').toLowerCase();
    return(!mo||e.date.slice(5,7)===mo)&&(!br||e.branch===br)&&(!st||e.payStatus===st)&&(!q||hay.includes(q));
  });
}

function evById(id){return allData.find(e=>e.id===id)}
function cell(id,key,val,type='text',cls=''){
  const shown=(type==='money')?fa(Number(val)||0):(val||'');
  return`<span class="editcell ${type==='area'?'areacell':''} ${cls}" data-val="${esc(val||'')}" onclick="editCell(event,'${id}','${key}','${type}')">${shown?esc(shown):'<span class="dash">-</span>'}</span>`;
}
function editCell(e,id,key,type='text'){
  e.stopPropagation();
  const host=e.currentTarget;
  const ev=evById(id);if(!ev)return;
  const cur=key==='methodsText'?ev.methods.join('+'):(ev[key]??'');
  let input;
  if(type==='select'){
    input=document.createElement('select');
    const opts=key==='branch'?['문래점','신논현점']:['완납','예약금 입금','미입금','취소'];
    opts.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===cur)o.selected=true;input.appendChild(o)});
    input.className='editinp';
  }else if(type==='area'){
    input=document.createElement('textarea');
    input.value=cur;
    input.className='editarea';
  }else{
    input=document.createElement('input');
    input.type=type==='date'?'date':'text';
    input.value=type==='money'?(Number(cur)||''):cur;
    input.className='editinp '+(type==='money'?'editnum':'');
  }
  host.innerHTML='';
  host.appendChild(input);
  input.focus();
  input.select?.();
  const done=()=>{
    const val=type==='money'?cleanNum(input.value):input.value.trim();
    setOv(id,key,val);
    render();
  };
  input.addEventListener('blur',done,{once:true});
  input.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'&&!ev.shiftKey)input.blur();
    if(ev.key==='Escape')render();
  });
}

function render(){
  const data=getFiltered();
  const 완납=data.filter(e=>e.payStatus==='완납');
  document.getElementById('ct').textContent=data.length+'건';
  document.getElementById('ca').textContent=fa(완납.reduce((s,e)=>s+e.netIn,0));
  document.getElementById('cd').textContent=fa(data.reduce((s,e)=>s+e.dep,0));
  document.getElementById('c1').textContent=완납.length+'건';
  document.getElementById('c2').textContent=data.filter(e=>e.payStatus==='예약금 입금').length+'건';
  document.getElementById('c3').textContent=data.filter(e=>e.payStatus==='취소').length+'건';
  if(!data.length){document.getElementById('tb').innerHTML='<div class="gridmsg">해당 조건의 데이터가 없습니다.</div>';return}
  const rows=[];
  for(const ev of data){
    const bc=ev.branch==='문래점'?'brm':'brs';
    const methodText=ev.methods.join('+')||'기타';
    // 상태값에서 공백 제거하여 CSS 클래스로 사용 (예: '예약금 입금' -> 's예약금입금')
    const sCls='s'+ev.payStatus.replace(/\s+/g,'');
    rows.push(`<div class="grow${ev.hidden?' hidden-row':''}">
      <div class="gcell datecell">${cell(ev.id,'date',ev.date,'date')}</div>
      <div class="gcell"><span class="${bc}">${cell(ev.id,'branch',ev.branch,'select')}</span></div>
      <div class="gcell">
        <div class="titlecell">
          <span class="titletext" title="${esc(ev.title)}">${cell(ev.id,'title',ev.title,'text')}</span>
          <button class="rawbtn" onclick="openRaw('${ev.id}',event)">원문</button>
        </div>
      </div>
      <div class="gcell statuscell">
        <span class="bdg ${sCls}">${cell(ev.id,'payStatus',ev.payStatus,'select')}</span>
      </div>
      <div class="gcell"><div class="date2">${cell(ev.id,'reservationDate',ev.reservationDate,'date')}<span class="sub">${cell(ev.id,'reservationAmount',ev.reservationAmount,'money')}</span></div></div>
      <div class="gcell"><div class="date2">${cell(ev.id,'balanceDate',ev.balanceDate,'date')}<span class="sub">${cell(ev.id,'balanceAmount',ev.balanceAmount,'money')}</span></div></div>
      <div class="gcell r moneycell">${cell(ev.id,'netIn',ev.netIn,'money','amt')}</div>
      <div class="gcell r moneycell">${cell(ev.id,'dep',ev.dep,'money','dep')}</div>
      <div class="gcell paycell">
        <span class="bdg m${methodText.split('+')[0]}">${cell(ev.id,'methodsText',methodText,'text')}</span>
      </div>
      <div class="gcell notecell"><span class="note" title="${esc(ev.notes)}">${cell(ev.id,'notes',ev.notes,'area')}</span></div>
      <div class="gcell" style="width:40px;text-align:center">${ev.hidden?`<button class="restbtn" onclick="restoreRow('${ev.id}',event)" title="복원">↩</button>`:`<button class="delbtn" onclick="hideRow('${ev.id}',event)" title="숨기기">✕</button>`}</div>
    </div>`);
  }
  document.getElementById('tb').innerHTML=rows.join('');
}

function hideRow(id,e){
  e?.stopPropagation();
  setOv(id,'hidden',true);
  render();
}
function restoreRow(id,e){
  e?.stopPropagation();
  setOv(id,'hidden',false);
  render();
}
function toggleHidden(){
  showHidden=!showHidden;
  const btn=document.getElementById('thbtn');
  btn.classList.toggle('active',showHidden);
  btn.textContent=showHidden?'🗑 숨김 숨기기':'🗑 숨긴 항목';
  render();
}

function openRaw(id,e){
  e?.stopPropagation();
  const ev=evById(id);if(!ev)return;
  document.getElementById('rawMeta').innerHTML=`
    <b>원본 제목</b><div>${esc(ev.rawTitle||'-')}</div>
    <b>표시 제목</b><div>${esc(ev.title||'-')}</div>
    <b>지점</b><div>${esc(ev.rawBranch||ev.branch||'-')}</div>
    <b>시작</b><div>${esc(ev.rawStart||'-')}</div>
    <b>종료</b><div>${esc(ev.rawEnd||'-')}</div>
  `;
  document.getElementById('rawDesc').textContent=sh(ev.rawDesc||'원문 설명 없음').trim()||'원문 설명 없음';
  document.getElementById('rawModal').classList.add('show');
}

function closeRaw(e){
  if(e&&e.target.id!=='rawModal')return;
  document.getElementById('rawModal').classList.remove('show');
}

function doExport(){
  const data=getFiltered();
  const H=['대관일','지점','행사명','수납상태','예약금입금일','예약금액','잔금입금일','잔금액','보증금제외수납','청소보증금','결제방법','메모'];
  const rows=data.map(e=>[
    e.date,e.branch,`"${e.title.replace(/"/g,'""')}"`,e.payStatus,
    e.reservationDate,e.reservationAmount||0,e.balanceDate,e.balanceAmount||0,
    e.netIn||0,e.dep||0,e.methods.join('+'),`"${(e.notes||'').replace(/"/g,'""')}"`
  ]);
  const csv='﻿'+[H.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`올댓마인드_입금관리_${document.getElementById('sy').value}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

if(sessionStorage.getItem(ACCESS_KEY)==='1')showApp();
