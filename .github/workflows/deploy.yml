name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
      - name: Run browser checks
        run: npm test
      - name: Prepare static site
        run: |
          rm -rf dist
          mkdir dist
          cp index.html dist/index.html
          cp payment.html dist/payment.html
      - name: Ensure Cloudflare Pages production branch
        run: |
          curl --fail-with-body -X PATCH "https://api.cloudflare.com/client/v4/accounts/af27f3bbca2209ff9cb2c77a2e47184a/pages/projects/project1" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"production_branch":"main"}'
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: af27f3bbca2209ff9cb2c77a2e47184a
          projectName: project1
          directory: dist
          branch: main
